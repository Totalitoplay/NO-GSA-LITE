<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R3 Scripts</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #16a34a;
            --warning: #ea580c;
            --bg: #f8fafc;
            --card: #ffffff;
            --slate-800: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--slate-800);
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; 
            height: 100dvh;
            overscroll-behavior: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Topbar ── */
        #topbar {
            background: var(--slate-800); color: white; padding: 0 15px;
            display: flex; align-items: center; gap: 12px; height: 56px; flex-shrink: 0;
        }
        #topbar h1 { font-size: 16px; font-weight: 700; white-space: nowrap; }
        #inventarioStatus { font-size: 11px; color: #94a3b8; }
        #tabs { display: flex; gap: 4px; margin-left: auto; }
        .tab-btn {
            padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px;
            font-weight: 600; cursor: pointer; background: transparent; color: #94a3b8; transition: all 0.2s;
        }
        .tab-btn:hover { background: #334155; color: white; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* ── Vistas ── */
        #view-lista, #view-mapa { flex: 1; overflow: hidden; display: none; flex-direction: column; }
        #view-lista.active, #view-mapa.active { display: flex; }

        /* ── Lista ── */
        #lista-scroll { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; align-items: center; }
        .card { background: var(--card); border-radius: 12px; border: 1px solid #e2e8f0; padding: 20px; width: 100%; max-width: 860px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .card-title { font-size: 12px; font-weight: 700; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
        label { display: block; font-weight: 600; font-size: 13px; color: var(--secondary); margin-bottom: 6px; }
        textarea { width: 100%; height: 90px; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; font-size: 14px; resize: vertical; margin-bottom: 12px; }
        textarea:focus { outline: 2px solid #93c5fd; border-color: var(--primary); }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; width: 100%; transition: background 0.15s, transform 0.1s; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn-ghost { background: #f1f5f9; color: #475569; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; width: 100%; margin-top: 8px; transition: background 0.15s; }
        .btn-ghost:hover { background: #e2e8f0; }

        /* ── Resumen ── */
        #resultCounter { display: none; font-size: 13px; }
        #summaryStats { display: none; border-top: 4px solid var(--primary); }
        #statsContent { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 10px; }
        .stat-card { background: #f1f5f9; padding: 12px; border-radius: 8px; border-left: 4px solid var(--primary); cursor: pointer; transition: transform 0.15s, background 0.15s; }
        .stat-card:hover { transform: scale(1.03); background: #e2e8f0; }

        /* ── Tabla Base ── */
        #resultTable { width: 100%; max-width: 860px; border-collapse: separate; border-spacing: 0; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        #resultTable thead th { background: var(--slate-800); color: #f8fafc; text-align: left; padding: 14px 16px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; user-select: none; }
        #resultTable tbody td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        #resultTable tbody tr:hover { background: #f1f7ff; }
        .no-encontrada { background: #fff1f2 !important; color: #be123c; }
        .qr-badge { background: #fff7ed; color: var(--warning); padding: 4px 8px; border-radius: 6px; font-weight: 700; border: 1px solid #ffedd5; cursor: pointer; font-size: 12px; display: inline-block; text-align: center; }

        /* ── Mapa y Toolbar ── */
        #mapa-toolbar { background: var(--slate-800); padding: 10px 15px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
        #mapa-toolbar select, #mapa-toolbar input[type="text"] { padding: 8px 10px; border-radius: 6px; border: none; font-size: 13px; background: #334155; color: white; font-family: inherit; }
        #mapa-toolbar input[type="text"]::placeholder { color: #94a3b8; }
        #mapa-toolbar input[type="text"] { width: 90px; flex: 1; }
        #btn-ir { background: var(--warning); color: white; border: none; padding: 8px 14px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        #btn-capas { background: #0f6e56; color: white; border: none; padding: 8px 14px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        #mapa-pin-info { font-size: 12px; color: #94a3b8; }
        #mapa-body { flex: 1; display: flex; overflow: hidden; position: relative; }
        #map { flex: 1; width: 100%; background: #e5e7eb; }

        /* ── Panel capas ── */
        #panel-capas { width: 320px; background: white; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; position: absolute; right: 0; top: 0; bottom: 0; z-index: 9999; box-shadow: -4px 0 12px rgb(0 0 0 / 0.1); }
        #panel-capas.abierto { transform: translateX(0); }
        #capas-header { background: var(--slate-800); color: white; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;}
        #capas-header span { font-weight: 700; font-size: 14px; }
        #btn-cerrar-capas { background: none; border: none; color: white; font-size: 20px; padding: 0; cursor: pointer; }
        #capas-acciones { padding: 10px 14px; display: flex; gap: 8px; border-bottom: 1px solid #e2e8f0; flex-shrink:0;}
        .btn-capas-accion { flex: 1; background: #f1f5f9; padding: 8px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; }
        #capas-lista { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .header-carpeta:hover { background: #f8fafc; }
        
        /* ── Modal (Action Sheet) CSS ── */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(2px); display: none; justify-content: center; align-items: flex-end; z-index: 10000; opacity: 0; transition: opacity 0.25s ease; }
        .modal-overlay.activo { display: flex; opacity: 1; }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 20px 20px 0 0; padding: 15px 24px 30px 24px; text-align: center; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 -4px 20px rgba(0,0,0,0.15); }
        .modal-overlay.activo .modal-content { transform: translateY(0); }
        .modal-drag-handle { width: 40px; height: 5px; background: #cbd5e1; border-radius: 10px; margin: 0 auto 15px auto; }
        .modal-buttons { display: flex; flex-direction: column; gap: 12px; margin-bottom: 8px; }
        .btn-google { background: #ea4335; color: white; border: none; padding: 11px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; text-decoration: none; transition: background 0.15s; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-google:hover { background: #c5221f; }

        @media (min-width: 601px) {
            .modal-overlay { align-items: center; padding: 20px; }
            .modal-content { border-radius: 16px; transform: scale(0.95); padding: 24px; }
            .modal-overlay.activo .modal-content { transform: scale(1); }
            .modal-drag-handle { display: none; }
        }

        /* ── MEDIA QUERIES (MAGIA MOBILE) ── */
        @media (max-width: 600px) {
            #inventarioStatus { display: none; }
            .card { padding: 15px; }
            #mapa-toolbar { padding: 10px; gap: 6px; }
            #mapa-toolbar select { width: 100%; margin-bottom: 4px; }
            #mapa-toolbar input[type="text"] { flex: 1; min-width: 45%; }
            #panel-capas { width: 100%; border-left: none; }
            
            #resultTable { box-shadow: none; border: none; background: transparent; }
            #resultTable thead { display: none; }
            #resultTable tbody tr { display: block; width: 100%; margin-bottom: 16px; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; background: white; box-shadow: 0 2px 4px rgb(0 0 0 / 0.05); }
            #resultTable tbody td { display: flex; justify-content: space-between; align-items: center; text-align: right; padding: 8px 4px; border-bottom: 1px solid #f8fafc; }
            #resultTable tbody td:last-child { border-bottom: none; }
            #resultTable td::before { content: attr(data-label); font-weight: 700; color: var(--secondary); font-size: 11px; }
        }
    </style>
</head>
<body>

<div id="topbar">
    <h1>⚡ R3 Scripts</h1>
    <span id="inventarioStatus">⏳ Cargando inventario...</span>
    <div id="tabs">
        <button class="tab-btn active" onclick="switchTab('lista')">📋 Lista</button>
        <button class="tab-btn" onclick="switchTab('mapa')">🗺 Mapa</button>
    </div>
</div>

<div id="view-lista" class="active">
    <div id="lista-scroll">
        <div class="card">
            <div class="card-title">Cargar clientes</div>
            <div style="display:flex; gap:14px; flex-wrap:wrap; margin-bottom:14px;">
                <div style="flex:1; min-width:180px;">
                    <label>Subir CSV</label>
                    <input type="file" id="clientCsvFile" accept=".csv">
                </div>
                <div style="flex:1; min-width:180px;">
                    <label>Pegar reporte</label>
                    <textarea id="reportInput" placeholder="Pega aquí el reporte..."></textarea>
                </div>
            </div>
            <button class="btn-primary" onclick="procesarBusqueda()" id="btnBuscar">🔍 Localizar QRs</button>
            <button class="btn-ghost" onclick="limpiarTodo()">🗑 Limpiar resultados</button>
        </div>

        <div id="resultCounter" class="card" style="padding:12px 16px;"></div>

        <div id="summaryStats" class="card">
            <div class="card-title">📊 Resumen de impacto por QR</div>
            <div id="statsContent"></div>
        </div>

        <table id="resultTable">
            <thead>
                <tr>
                    <th onclick="ordenarTabla(0)">Estado ↕</th>
                    <th onclick="ordenarTabla(1)">Cuenta ↕</th>
                    <th onclick="ordenarTabla(2)">QR ↕</th>
                    <th>Coordenadas</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="view-mapa">
    <div id="mapa-toolbar">
        <select id="kmzSelect">
            <option value="">— KMZ —</option>
            <option value="ALDAMA_1.kmz">Aldama 1</option>
            <option value="ALDAMA_2.kmz">Aldama 2</option>
            <option value="BUENOS_AIRES.kmz">BUENOS AIRES</option>
        </select>
        <input type="file" id="fileInput" accept=".kmz" title="Subir KMZ" style="font-size:11px;color:#94a3b8;width:110px;">
        <input type="text" id="latInput" placeholder="Latitud">
        <input type="text" id="lngInput" placeholder="Longitud">
        <button id="btn-ir">📍 Ir</button>
        <button id="btn-capas" onclick="togglePanelCapas()">🗂 Capas</button>
        <span id="mapa-pin-info"></span>
    </div>
    <div id="mapa-body">
        <div id="map"></div>
        <div id="panel-capas">
            <div id="capas-header">
                <span>🗂 Capas del KMZ</span>
                <button id="btn-cerrar-capas" onclick="togglePanelCapas()">✕</button>
            </div>
            <div style="padding: 10px 14px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                <input type="text" id="buscador-capas" placeholder="Buscar código (ej. ALD-1D)..." 
                       onkeyup="filtrarCapas(this.value)" 
                       style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 12px; outline: none;">
            </div>
            <div id="capas-acciones">
                <button class="btn-capas-accion" onclick="toggleTodasCapas(true)">✅ Todas</button>
                <button class="btn-capas-accion" onclick="toggleTodasCapas(false)">⬜ Ninguna</button>
            </div>
            <div id="capas-lista"></div>
        </div>
    </div>
</div>

<div id="modal-opciones-tp" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-drag-handle"></div>
        <h3 id="modal-tp-title" style="margin-bottom: 5px; font-size: 16px; color: #1e293b;">Nombre del TP</h3>
        <p style="font-size: 12px; color: #64748b; margin-bottom: 16px;">¿Qué deseas hacer con este punto?</p>
        
        <div class="modal-buttons">
            <button id="btn-modal-kmz" class="btn-primary" style="display: flex; justify-content: center; gap: 8px;">
                <span>🗺️</span> Ver en este mapa (KMZ)
            </button>
            <a id="btn-modal-gmaps" href="#" target="_blank" class="btn-google">
                <span>📍</span> Iniciar ruta en Google Maps
            </a>
            <button id="btn-modal-copy" class="btn-ghost" style="display: flex; justify-content: center; gap: 8px;">
                <span>📄</span> Copiar Código
            </button>
        </div>
        
        <button class="btn-ghost" style="margin-top: 10px;" onclick="cerrarOpcionesTP()">Cancelar</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="app.js?v=100"></script>
<script>
    var mapaIniciado = false;
    var map, pinActual;
    const BASE_URL = '/kmz/';

    /* ── Tabs ── */
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('#view-lista, #view-mapa').forEach(v => v.classList.remove('active'));
        document.querySelector('.tab-btn[onclick="switchTab(\'' + tab + '\')"]').classList.add('active');
        document.getElementById('view-' + tab).classList.add('active');
        if (tab === 'mapa') {
            if (!mapaIniciado) { iniciarMapa(); mapaIniciado = true; }
            else setTimeout(() => map.invalidateSize(), 100);
        }
    }

    /* ── Panel capas ── */
    function togglePanelCapas() {
        const panel = document.getElementById('panel-capas');
        if (panel) {
            const estaAbierto = panel.classList.contains('abierto');
            if (estaAbierto) {
                panel.classList.remove('abierto');
                const buscador = document.getElementById('buscador-capas');
                if (buscador) buscador.blur();
                window.scrollTo(0, 0); 
                document.body.scrollTop = 0;
            } else {
                panel.classList.add('abierto');
            }
        }
        if (mapaIniciado && map) setTimeout(() => map.invalidateSize(), 300);
    }

    // Variables globales para KML recursivo
    var arbolCarpetas = [];
    var folderMap = {};
    
    function toggleFolder(uid, event) {
        if (event) event.stopPropagation();
        const sub = document.getElementById(uid);
        const toggle = document.getElementById('toggle_' + uid);
        if (sub) {
            const isVisible = sub.style.display !== 'none';
            sub.style.display = isVisible ? 'none' : 'block';
            if (toggle) {
                if (isVisible) toggle.classList.remove('abierto');
                else toggle.classList.add('abierto');
            }
        }
    }
    
    function toggleNivel(elemento) {
        const visible = typeof elemento === 'boolean' ? elemento : elemento.checked;
        if (typeof elemento !== 'boolean') {
            const header = elemento.closest('.header-carpeta');
            if (header && header.nextElementSibling && header.nextElementSibling.classList.contains('subcarpetas')) {
                header.nextElementSibling.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = visible);
            }
        }
        document.querySelectorAll('.cb-capa').forEach(cb => {
            const uid = cb.dataset.uid;
            const capa = folderMap[uid];
            if (capa && capa.lg) { 
                if (cb.checked) map.addLayer(capa.lg);
                else map.removeLayer(capa.lg);
            }
        });
    }
    
    function toggleTodasCapas(visible) {
        document.querySelectorAll('.cb-capa').forEach(cb => cb.checked = visible);
        toggleNivel(visible);
    }
    
    function filtrarCapas(texto) {
        const term = texto.toLowerCase().trim();
        document.querySelectorAll('.header-carpeta').forEach(header => {
            const nombre = header.querySelector('.nombre-capa').textContent.toLowerCase();
            if (nombre.includes(term)) header.style.display = 'flex';
            else header.style.display = 'none';
        });
        if (term !== '') {
            const headers = Array.from(document.querySelectorAll('.header-carpeta')).reverse();
            headers.forEach(header => {
                const sub = header.nextElementSibling;
                if (sub && sub.classList.contains('subcarpetas')) {
                    const tieneHijoVisible = Array.from(sub.querySelectorAll('.header-carpeta')).some(h => h.style.display !== 'none');
                    if (tieneHijoVisible) {
                        header.style.display = 'flex'; sub.style.display = 'block';
                        const toggle = header.querySelector('.carpeta-toggle');
                        if(toggle) toggle.classList.add('abierto');
                    }
                }
            });
        } else {
            document.querySelectorAll('.header-carpeta').forEach(h => h.style.display = 'flex');
            document.querySelectorAll('.subcarpetas').forEach(sub => {
                sub.style.display = 'none';
                const toggle = document.getElementById('toggle_' + sub.id);
                if(toggle) toggle.classList.remove('abierto');
            });
        }
    }

    function resaltarCarpeta(uid) {
        const panel = document.getElementById('panel-capas');
        if (panel && !panel.classList.contains('abierto')) {
            panel.classList.add('abierto');
            if (mapaIniciado && map) setTimeout(() => map.invalidateSize(), 300);
        }
        document.querySelectorAll('.header-carpeta').forEach(el => el.style.backgroundColor = 'transparent');
        const cb = document.querySelector(`.cb-capa[data-uid="${uid}"]`);
        if (!cb) return;
        const header = cb.closest('.header-carpeta');
        if (header) {
            header.style.backgroundColor = '#dbeafe'; 
            let nodoActual = header;
            while (nodoActual) {
                const contenedorSub = nodoActual.closest('.subcarpetas');
                if (!contenedorSub) break;
                contenedorSub.style.display = 'block';
                const headerPadre = contenedorSub.previousElementSibling;
                if (headerPadre && headerPadre.classList.contains('header-carpeta')) {
                    const toggle = headerPadre.querySelector('.carpeta-toggle');
                    if (toggle) toggle.classList.add('abierto');
                }
                nodoActual = headerPadre;
            }
            setTimeout(() => { header.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300); 
        }
    }

    function renderizarPanelCapas() {
        const lista = document.getElementById('capas-lista');
        lista.innerHTML = '';
        function crearHTML(carpeta, nivel) {
            const div = document.createElement('div');
            const indent = nivel * 14; 
            const tieneHijos = carpeta.hijos.length > 0;
            div.innerHTML = `
                <div class="header-carpeta" style="display:flex; align-items:center; padding: 7px 14px; cursor:pointer; border-bottom:1px solid #f1f5f9; padding-left: ${14 + indent}px" onclick="toggleFolder('${carpeta.uid}', event)">
                    <input type="checkbox" checked class="cb-capa" data-uid="${carpeta.uid}" onclick="event.stopPropagation()" onchange="toggleNivel(this)" style="margin-right:8px;">
                    <span style="font-size:12px; font-weight:${nivel === 0 ? '700' : '600'}; color:#334155; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" class="nombre-capa">${carpeta.nombre}</span>
                    <span style="font-size:10px; color:#94a3b8; margin-right:8px;">${carpeta.cantidadTotal}</span>
                    ${tieneHijos ? `<span class="carpeta-toggle" id="toggle_${carpeta.uid}" style="font-size:10px; color:#94a3b8; transition: transform 0.2s;">▶</span>` : '<span style="width:10px"></span>'}
                </div>
                ${tieneHijos ? `<div class="subcarpetas" id="${carpeta.uid}" style="display:none;"></div>` : ''}
            `;
            if (tieneHijos) {
                const subContenedor = div.querySelector('.subcarpetas');
                carpeta.hijos.forEach(hijo => subContenedor.appendChild(crearHTML(hijo, nivel + 1)));
            }
            return div;
        }
        arbolCarpetas.forEach(raiz => lista.appendChild(crearHTML(raiz, 0)));
    }
    
    async function parsearKMZ(buffer) {
        Object.values(folderMap).forEach(data => map.removeLayer(data.lg));
        folderMap = {}; arbolCarpetas = [];
        const todosLosBounds = [];
        const zip = await JSZip.loadAsync(buffer);
        const kmlFile = Object.values(zip.files).find(f => f.name.endsWith('.kml'));
        if (!kmlFile) { alert('No se encontró KML'); return; }
        const kmlDoc = new DOMParser().parseFromString(await kmlFile.async('string'), 'text/xml');
        
        const styles = {};
        kmlDoc.querySelectorAll('Style').forEach(s => {
            const id = s.getAttribute('id'); if (!id) return;
            styles['#' + id] = {
                iconHref: s.querySelector('IconStyle Icon href')?.textContent?.trim(),
                iconColor: s.querySelector('IconStyle color')?.textContent?.trim(), // 🟢 ¡Extraemos el color del punto!
                lineColor: s.querySelector('LineStyle color')?.textContent?.trim(),
                polyColor: s.querySelector('PolyStyle color')?.textContent?.trim()
            };
        });
        kmlDoc.querySelectorAll('StyleMap').forEach(sm => {
            const id = sm.getAttribute('id');
            const pair = [...sm.querySelectorAll('Pair')].find(p => p.querySelector('key')?.textContent === 'normal');
            const url = pair?.querySelector('styleUrl')?.textContent?.trim();
            if (id && url) styles['#' + id] = styles[url] || {};
        });
        
        function hex(c) { return (!c || c.length < 8) ? null : '#' + c.slice(6,8) + c.slice(4,6) + c.slice(2,4); }
        function coords(el) {
            if (!el?.textContent) return [];
            return el.textContent.trim().split(/\s+/).map(c => {
                const p = c.split(',').map(Number);
                return (p.length < 2 || isNaN(p[0]) || isNaN(p[1])) ? null : [p[1], p[0]];
            }).filter(Boolean);
        }
        
        function crearLayersDirectos(pm, style) {
            const name = pm.querySelector(':scope > name')?.textContent?.trim() || '';
            const desc = pm.querySelector(':scope > description')?.textContent?.trim() || '';
            const popup = '<b>' + name + '</b>' + (desc ? '<br>' + desc : '');
            const layers = [];
            
            pm.querySelectorAll('Polygon').forEach(poly => {
                const c = coords(poly.querySelector('outerBoundaryIs coordinates'));
                if (!c.length) return;
                const color = hex(style.polyColor) || hex(style.lineColor) || '#3388ff';
                const l = L.polygon(c, { color, fillColor: color, fillOpacity: 0.4 });
                l.bindPopup(popup); if (name) l.bindTooltip(name, { sticky: true });
                layers.push(l);
            });
            pm.querySelectorAll('LineString').forEach(line => {
                const c = coords(line.querySelector('coordinates'));
                if (!c.length) return;
                const l = L.polyline(c, { color: hex(style.lineColor) || '#e74c3c', weight: 3 });
                l.bindPopup(popup); if (name) l.bindTooltip(name, { sticky: true });
                layers.push(l);
            });
            pm.querySelectorAll('Point').forEach(point => {
                const c = coords(point.querySelector('coordinates'));
                if (!c.length) return;
                
                let m;
                // Detectamos el color exacto que pide el KMZ para este punto
                let hexColor = style.iconColor ? hex(style.iconColor) : null;
                let colorBase = hexColor || hex(style.lineColor) || '#ea580c'; // Naranja de seguridad

                if (style.iconHref) {
                    // Si trae una forma (imagen) y pide un color que NO sea blanco (#ffffff)
                    if (hexColor && hexColor !== '#ffffff') {
                        // 🌟 TRUCO PRO: Usamos la imagen como "máscara" y la rellenamos del color
                        const iconHtml = `<div style="
                            width: 22px; height: 22px; 
                            background-color: ${hexColor}; 
                            -webkit-mask: url('${style.iconHref}') no-repeat center / contain; 
                            mask: url('${style.iconHref}') no-repeat center / contain;">
                        </div>`;
                        m = L.marker(c[0], { icon: L.divIcon({ html: iconHtml, className: '', iconSize: [22, 22], iconAnchor: [11, 11] }) });
                    } else {
                        // Si la imagen no lleva color (o es blanca), cargamos el ícono a todo color original
                        const iconHtml = `<img src="${style.iconHref}" style="width: 24px; height: 24px; object-fit: contain;">`;
                        m = L.marker(c[0], { icon: L.divIcon({ html: iconHtml, className: '', iconSize: [24, 24], iconAnchor: [12, 12] }) });
                    }
                } else {
                    // Si el elemento KML de verdad no tiene forma, le ponemos nuestro círculo rápido
                    m = L.circleMarker(c[0], {
                        radius: 5, fillColor: colorBase, fillOpacity: 1, color: '#ffffff', weight: 1.5
                    });
                }
                
                m.bindPopup(popup); 
                if (name) m.bindTooltip(name, { permanent: false, direction: 'top' });
                layers.push(m);
            });
            return layers;
        }
        
        function procesarCarpeta(nodoXML) {
            const uid = 'uid_' + Math.random().toString(36).substring(2);
            const nombre = nodoXML.querySelector(':scope > name')?.textContent?.trim() || 'Sin nombre';
            const lgDirecto = L.layerGroup().addTo(map); 
            let cantidadTotal = 0;
            const hijos = [];
            
            nodoXML.querySelectorAll(':scope > Placemark').forEach(pm => {
                const style = styles[pm.querySelector('styleUrl')?.textContent?.trim()] || {};
                crearLayersDirectos(pm, style).forEach(l => {
                    l.on('click', () => resaltarCarpeta(uid)); 
                    lgDirecto.addLayer(l);
                    cantidadTotal++;
                    if (l.getLatLng) todosLosBounds.push(l.getLatLng());
                    else if (l.getBounds) { const b = l.getBounds(); todosLosBounds.push(b.getNorthEast(), b.getSouthWest()); }
                });
            });
            
            folderMap[uid] = { lg: lgDirecto };
            nodoXML.querySelectorAll(':scope > Folder').forEach(subNodo => {
                const datosHijo = procesarCarpeta(subNodo);
                if (datosHijo.cantidadTotal > 0) { hijos.push(datosHijo); cantidadTotal += datosHijo.cantidadTotal; }
            });
            return { uid, nombre, cantidadTotal, hijos };
        }
        
        const raices = kmlDoc.querySelectorAll('Document > Folder, kml > Folder');
        raices.forEach(r => {
            const data = procesarCarpeta(r);
            if(data.cantidadTotal > 0) arbolCarpetas.push(data);
        });
        
// 🛡️ Filtro Inteligente de Coordenadas para el Auto-Zoom
        if (todosLosBounds.length > 0) {
            let limitesValidos = L.latLngBounds();
            let referencia = null;
            let puntosValidos = 0;

            todosLosBounds.forEach(punto => {
                // Validar que el punto sea real y no sea el centro del océano (0,0)
                if (!punto || isNaN(punto.lat) || isNaN(punto.lng) || (punto.lat === 0 && punto.lng === 0)) return;

                if (!referencia) {
                    referencia = punto; // Usamos el primer poste válido como "Ancla"
                    limitesValidos.extend(punto);
                    puntosValidos++;
                } else {
                    // Ignorar para el zoom cualquier punto a más de ~500km de distancia del ancla
                    if (Math.abs(punto.lat - referencia.lat) < 5 && Math.abs(punto.lng - referencia.lng) < 5) {
                        limitesValidos.extend(punto);
                        puntosValidos++;
                    }
                }
            });

            // Hacer el zoom solo con los puntos limpios
            if (todosLosBounds.length > 0) {
                        // Si ya tienes un PIN activo (buscaste un TP), NO muevas la cámara
                        if (pinActual && map.hasLayer(pinActual)) {
                            console.log("Manteniendo enfoque en el TP seleccionado...");
                        } else {
                            // Si no hay pin, buscamos el área de trabajo en Juárez
                            let limitesLimpios = L.latLngBounds();
                            let centroJuarez = L.latLng(31.74, -106.48); 
                            let puntosEncontrados = 0;
            
                            todosLosBounds.forEach(p => {
                                // Solo incluimos puntos que estén a menos de 100km de Juárez
                                // Esto ignora automáticamente basura en 0,0 o coordenadas corruptas
                                if (p && centroJuarez.distanceTo(p) < 100000) { 
                                    limitesLimpios.extend(p);
                                    puntosEncontrados++;
                                }
                            });
            
                            if (puntosEncontrados > 0) {
                                map.fitBounds(limitesLimpios, { padding: [30, 30], maxZoom: 18 });
                            }
                        }
                    }
        }
        renderizarPanelCapas();
    }

    // Inicialización del Mapa
    function iniciarMapa() {
        map = L.map('map', { preferCanvas: true }).setView([31.740, -106.487], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        document.getElementById('kmzSelect').addEventListener('change', function() { if (this.value) cargarKMZDesdeURL(this.value); });
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0]; if (!file) return;
            setPinInfo('Cargando ' + file.name + '...');
            await parsearKMZ(await file.arrayBuffer());
            setPinInfo(file.name + ' ✓');
        });
        document.getElementById('btn-ir').addEventListener('click', irManual);
        ['latInput','lngInput'].forEach(id => { document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') irManual(); }); });
    }

    function setPinInfo(txt) { document.getElementById('mapa-pin-info').textContent = txt; }
    function irManual() {
        const lat = parseFloat(document.getElementById('latInput').value);
        const lng = parseFloat(document.getElementById('lngInput').value);
        if (isNaN(lat) || isNaN(lng)) { setPinInfo('Coords inválidas'); return; }
        irACoordenadas(lat, lng, lat + ', ' + lng);
    }

    function irACoordenadas(lat, lng, label) {
        if (!mapaIniciado) { iniciarMapa(); mapaIniciado = true; }
        switchTab('mapa');
        setTimeout(() => {
            map.invalidateSize();
            if (pinActual) map.removeLayer(pinActual);
            
            pinActual = L.marker([lat, lng], {
                icon: L.divIcon({
                    className: '',
                    html: '<div style="background:#ea580c;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 0 6px rgba(0,0,0,0.4)"></div>',
                    iconAnchor: [8, 8]
                })
            }).addTo(map);
            
            const gmapsLink = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
            const popupHTML = `
                <div style="text-align:center;">
                    <b>${label || ''}</b><br>
                    <span style="font-size:11px; color:#64748b;">${lat}, ${lng}</span><br>
                    <a href="${gmapsLink}" target="_blank" style="display:inline-block; margin-top:8px; padding:4px 8px; background:#ea4335; color:white; text-decoration:none; border-radius:4px; font-size:11px; font-weight:bold;">📍 Abrir en Google Maps</a>
                </div>
            `;
            pinActual.bindPopup(popupHTML).openPopup();
            map.setView([lat, lng], 16);
            setPinInfo('📍 ' + (label || lat + ', ' + lng));
        }, 150);
    }

    async function cargarKMZDesdeURL(filename) {
        setPinInfo('Cargando ' + filename + '...');
        try {
            const r = await fetch(BASE_URL + filename);
            if (!r.ok) throw new Error('HTTP ' + r.status);
            await parsearKMZ(await r.arrayBuffer());
            setPinInfo(filename + ' ✓');
        } catch (err) { setPinInfo('Error: ' + err.message); }
    }

    // ── Funciones del Modal del TP ──
    function abrirOpcionesTP(lat, lng, tpLabel) {
        document.activeElement.blur(); 
        document.getElementById('modal-tp-title').textContent = tpLabel || 'Ubicación seleccionada';
        
        const btnKmz = document.getElementById('btn-modal-kmz');
        btnKmz.onclick = () => {
            cerrarOpcionesTP();
            irACoordenadas(lat, lng, tpLabel);
        };
        
        const btnGmaps = document.getElementById('btn-modal-gmaps');
        btnGmaps.href = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
        btnGmaps.onclick = () => cerrarOpcionesTP();

        const btnCopy = document.getElementById('btn-modal-copy');
        btnCopy.innerHTML = '<span>📄</span> Copiar Código'; 
        btnCopy.onclick = () => {
            navigator.clipboard.writeText(tpLabel);
            btnCopy.innerHTML = '<span>✅</span> ¡Copiado!';
            setTimeout(() => { cerrarOpcionesTP(); }, 800);
        };
        
        document.getElementById('modal-opciones-tp').classList.add('activo');
    }

    function cerrarOpcionesTP() {
        const modal = document.getElementById('modal-opciones-tp');
        modal.classList.remove('activo');
    }

    /* ── Overrides app.js ── */
    function renderizarTabla(datos) {
        const tbody = document.querySelector('#resultTable tbody');
        if (!tbody) return; // Protección anti-errores
        
        if (!datos.length) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:40px;color:#64748b;">😕 Sin resultados</td></tr>';
            return;
        }
        tbody.innerHTML = datos.map(res => {
            if (res.encontrado) {
                const lat = parseFloat(res.lat), lng = parseFloat(res.lon);
                return `<tr>
                    <td data-label="ESTADO">✅</td>
                    <td data-label="CUENTA"><b>${res.cuenta}</b></td>
                    <td data-label="TP">
                        <span class="qr-badge" onclick="abrirOpcionesTP(${lat}, ${lng}, '${res.qr}')" title="Ver opciones" style="padding: 6px 10px; font-size: 14px;">
                            ${res.qr} 👆
                        </span>
                    </td>
                    <td data-label="COORD" style="font-size:11px;color:#64748b;">${res.lat}, ${res.lon}</td>
                </tr>`;
            } else {
                return `<tr class="no-encontrada">
                    <td>❌</td><td>${res.cuenta}</td><td colspan="2">No encontrada en inventario</td>
                </tr>`;
            }
        }).join('');
    }

    function mostrarResumen(conteo) {
        const contenedorStats = document.getElementById('summaryStats');
        const contenido = document.getElementById('statsContent');
        const ordenados = Object.entries(conteo).sort((a, b) => b[1] - a[1]);
        if (!ordenados.length) { contenedorStats.style.display = 'none'; return; }
        contenedorStats.style.display = 'block';
        contenido.innerHTML = ordenados.map(([qr, total]) => {
            const dato = resultadosActuales.find(r => r.qr === qr && r.encontrado);
            const lat = dato ? parseFloat(dato.lat) : null;
            const lng = dato ? parseFloat(dato.lon) : null;
            const click = lat ? `abrirOpcionesTP(${lat},${lng},'${qr}')` : '';
            return `<div class="stat-card" onclick="${click}">
                <span style="font-size:10px;font-weight:700;color:#2563eb;display:block;margin-bottom:4px;">🗺 VER MAPA</span>
                <span style="font-size:12px;font-weight:700;color:#1e293b;display:block;border-bottom:1px dashed #cbd5e1;padding-bottom:4px;margin-bottom:4px;">${qr}</span>
                <div style="font-size:20px;font-weight:700;color:#1e293b;">${total} <small style="font-size:10px;color:#64748b;">ctes</small></div>
            </div>`;
        }).join('');
    }
</script>
