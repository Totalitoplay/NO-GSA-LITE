<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Clusters - Premium</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #4F46E5; /* Indigo moderno */
            --primary-hover: #4338CA;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --border-glass: rgba(255, 255, 255, 0.4);
            --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.12), 0 1px 3px rgba(0, 0, 0, 0.05);
            --text-main: #1F2937;
            --text-muted: #6B7280;
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f3f4f6;
            overflow: hidden;
        }

        #mapa { 
            width: 100%; 
            height: 100vh; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Panel Flotante Estilizado (Izquierda) */
        .panel-dashboard {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            width: 360px;
            background: var(--bg-glass);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow);
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .titulo-app {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 16px 0;
            letter-spacing: -0.025em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .titulo-app::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--primary);
            border-radius: 50%;
        }

        /* Buscador */
        .busqueda-container {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .input-busqueda {
            flex-grow: 1;
            padding: 12px 16px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            font-family: inherit;
            font-size: 13.5px;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s ease;
        }

        .input-busqueda:focus {
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        .btn-accion {
            padding: 12px 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            font-size: 13.5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-accion:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        /* Resultados de Conversión */
        .panel-resultados {
            display: none;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            padding: 14px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            animation: slideDown 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .resultado-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .resultado-item:last-child {
            margin-bottom: 0;
        }

        .resultado-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .resultado-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .resultado-valor {
            font-size: 13px;
            font-family: monospace;
            color: var(--text-main);
            font-weight: 500;
        }

        /* Botón de copiar estético */
        .btn-copiar {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: var(--text-muted);
        }

        .btn-copiar:hover {
            background: rgba(0, 0, 0, 0.05);
            color: var(--primary);
        }

        /* Notificación Temporal de Copiado */
        .toast-copiado {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            z-index: 2000;
            background: #1F2937;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
        }

        .toast-copiado.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Selector de Capas Estilizado */
        .selector-capas {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            background: rgba(0, 0, 0, 0.04);
            padding: 4px;
            border-radius: 10px;
        }

        .capa-opcion {
            flex: 1;
            text-align: center;
            padding: 8px 4px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 7px;
            transition: all 0.2s ease;
        }

        .capa-opcion.activa {
            background: #ffffff;
            color: var(--text-main);
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }

        /* Barra de Coordenadas en Vivo (Inferior Derecha) */
        .coordenadas-live {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-main);
            box-shadow: var(--shadow);
            display: flex;
            gap: 12px;
        }

        .live-item span {
            color: var(--text-muted);
            font-weight: 600;
            margin-right: 4px;
        }

        /* Quitar marca de agua y acomodar controles nativos */
        .leaflet-control-attribution {
            background: rgba(255, 255, 255, 0.5) !important;
            backdrop-filter: blur(4px);
        }
        
        .leaflet-top.leaflet-right {
            top: 20px;
            right: 20px;
        }
        
        .leaflet-bar {
            border: none !important;
            box-shadow: var(--shadow) !important;
            border-radius: 12px !important;
            overflow: hidden;
        }

        .leaflet-bar a {
            background: var(--bg-glass) !important;
            backdrop-filter: blur(8px);
            color: var(--text-main) !important;
            border-bottom: 1px solid var(--border-glass) !important;
        }
    </style>
</head>
<body>

    <div class="panel-dashboard">
        <h1 class="titulo-app">Visualizador de Infraestructura</h1>
        
        <div class="selector-capas">
            <div class="capa-opcion activa" onclick="cambiarMapa('limpio')">Limpio</div>
            <div class="capa-opcion" onclick="cambiarMapa('satelite')">Satélite</div>
            <div class="capa-opcion" onclick="cambiarMapa('oscuro')">Oscuro</div>
        </div>

        <div class="busqueda-container">
            <input type="text" id="buscador-input" class="input-busqueda" placeholder="Buscar coordenadas o Plus Code...">
            <button id="btn-buscar" class="btn-accion">Buscar</button>
        </div>

        <div id="panel-info" class="panel-resultados">
            <div class="resultado-item">
                <div class="resultado-info">
                    <span class="resultado-label">Decimal</span>
                    <span id="info-decimal" class="resultado-valor">-</span>
                </div>
                <button class="btn-copiar" onclick="copiarTexto('info-decimal')">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                </button>
            </div>
            <div class="resultado-item">
                <div class="resultado-info">
                    <span class="resultado-label">Grados DMS</span>
                    <span id="info-dms" class="resultado-valor">-</span>
                </div>
                <button class="btn-copiar" onclick="copiarTexto('info-dms')">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                </button>
            </div>
            <div class="resultado-item">
                <div class="resultado-info">
                    <span class="resultado-label">Plus Code</span>
                    <span id="info-plus" class="resultado-valor">-</span>
                </div>
                <button class="btn-copiar" onclick="copiarTexto('info-plus')">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="coordenadas-live">
        <div class="live-item"><span id="lbl-lat">LAT:</span><span id="live-lat">0.000000</span></div>
        <div class="live-item"><span id="lbl-lng">LNG:</span><span id="live-lng">0.000000</span></div>
    </div>

    <div id="toast" class="toast-copiado">¡Copiado al portapapeles!</div>

    <div id="mapa"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-kml@1.0.0/L.KML.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/open-location-code@1.0.4/openlocationcode.min.js"></script>

    <script>
        // 1. Capas base estilizadas
        // Mapa base Positron de CartoDB (estilo limpio, ideal "en blanco" para destacar polígonos)
        var capaLimpio = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
            attribution: '© OpenStreetMap, © CartoDB'
        });

        var capaSatelite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            attribution: 'Esri, i-cubed, USDA, USGS'
        });

        var capaOscuro = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
            attribution: '© OpenStreetMap, © CartoDB'
        });

        // Inicializar mapa centrado con el estilo "Limpio"
        var map = L.map('mapa', {
            center: [31.735, -106.481],
            zoom: 13,
            zoomControl: true,
            layers: [capaLimpio]
        });

        // Mover controles de zoom nativos abajo a la derecha para no obstruir el panel de control
        map.zoomControl.setPosition('bottomright');

        // Cambiar mapa base mediante el switch superior
        function cambiarMapa(tipo) {
            document.querySelectorAll('.capa-opcion').forEach(el => el.classList.remove('activa'));
            
            if (tipo === 'limpio') {
                map.addLayer(capaLimpio);
                map.removeLayer(capaSatelite);
                map.removeLayer(capaOscuro);
                event.target.classList.add('activa');
                cambiarColoresInterfaz(false);
            } else if (tipo === 'satelite') {
                map.addLayer(capaSatelite);
                map.removeLayer(capaLimpio);
                map.removeLayer(capaOscuro);
                event.target.classList.add('activa');
                cambiarColoresInterfaz(true);
            } else if (tipo === 'oscuro') {
                map.addLayer(capaOscuro);
                map.removeLayer(capaLimpio);
                map.removeLayer(capaSatelite);
                event.target.classList.add('activa');
                cambiarColoresInterfaz(true);
            }
        }

        // Ajuste dinámico de los textos de la interfaz según el fondo para legibilidad óptima
        function cambiarColoresInterfaz(isDarkMap) {
            const root = document.documentElement;
            if (isDarkMap) {
                root.style.setProperty('--bg-glass', 'rgba(17, 24, 39, 0.85)');
                root.style.setProperty('--border-glass', 'rgba(255, 255, 255, 0.1)');
                root.style.setProperty('--text-main', '#F9FAFB');
                root.style.setProperty('--text-muted', '#9CA3AF');
            } else {
                root.style.setProperty('--bg-glass', 'rgba(255, 255, 255, 0.85)');
                root.style.setProperty('--border-glass', 'rgba(255, 255, 255, 0.4)');
                root.style.setProperty('--text-main', '#1F2937');
                root.style.setProperty('--text-muted', '#6B7280');
            }
        }

        // Marcador estético para búsquedas
        var marcadorBusqueda = L.marker([0, 0]).addTo(map);
        map.removeLayer(marcadorBusqueda);

        // 2. Carga directa de KML respetando colores originales al 100%
        fetch('CLUSTERS.kml')
            .then(res => res.text())
            .then(kmltext => {
                const parser = new DOMParser();
                const kml = parser.parseFromString(kmltext, 'text/xml');
                const capaKml = new L.KML(kml);
                map.addLayer(capaKml);
                
                const limites = capaKml.getBounds();
                if (limites.isValid()) {
                    map.fitBounds(limites);
                }
            })
            .catch(err => console.error('Error cargando KML:', err));

        // 3. Sistema dinámico de lectura de cursor en vivo
        map.on('mousemove', function(e) {
            document.getElementById('live-lat').textContent = e.latlng.lat.toFixed(6);
            document.getElementById('live-lng').textContent = e.latlng.lng.toFixed(6);
        });

        // 4. Conversiones de Coordenadas
        function decimalToDMS(dd, isLat) {
            const dir = dd < 0 ? (isLat ? 'S' : 'W') : (isLat ? 'N' : 'E');
            const absDd = Math.abs(dd);
            const deg = Math.floor(absDd);
            const minFrac = (absDd - deg) * 60;
            const min = Math.floor(minFrac);
            const sec = ((minFrac - min) * 60).toFixed(2);
            return `${deg}° ${min}' ${sec}" ${dir}`;
        }

        function dmsToDecimal(degrees, minutes, seconds, direction) {
            let dd = parseFloat(degrees) + parseFloat(minutes)/60 + parseFloat(seconds)/3600;
            if (['S', 'W', 'O'].includes(direction.toUpperCase())) {
                dd = dd * -1;
            }
            return dd;
        }

        function procesarEntrada(texto) {
            texto = texto.trim();

            // CASO A: Plus Code
            if (texto.includes('+')) {
                let codigoLimpio = texto.split(/[\s,]+/)[0];
                if (openLocationCode.isShort(codigoLimpio)) {
                    codigoLimpio = openLocationCode.recoverNearest(codigoLimpio, 31.735, -106.481);
                }
                if (openLocationCode.isValid(codigoLimpio)) {
                    const decodificado = openLocationCode.decode(codigoLimpio);
                    return { lat: decodificado.latitudeCenter, lng: decodificado.longitudeCenter };
                }
            }

            // CASO B: DMS
            const regexDMS = /(\d+(?:\.\d+)?)[°\s]+(\d+(?:\.\d+)?)[′''\s]+(\d+(?:\.\d+)?)"?[″""\s]*([NSEWO])/gi;
            const matches = [...texto.matchAll(regexDMS)];
            if (matches.length === 2) {
                const lat = dmsToDecimal(matches[0][1], matches[0][2], matches[0][3], matches[0][4]);
                const lng = dmsToDecimal(matches[1][1], matches[1][2], matches[1][3], matches[1][4]);
                return { lat, lng };
            }

            // CASO C: Decimales directos
            const cleanStr = texto.replace(/[,;]/g, ' ');
            const partes = cleanStr.trim().split(/\s+/);
            if (partes.length === 2) {
                const lat = parseFloat(partes[0]);
                const lng = parseFloat(partes[1]);
                if (!isNaN(lat) && !isNaN(lng) && lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
                    return { lat, lng };
                }
            }
            return null;
        }

        function actualizarPanelInfo(lat, lng) {
            const dmsLat = decimalToDMS(lat, true);
            const dmsLng = decimalToDMS(lng, false);
            const plusCode = openLocationCode.encode(lat, lng);

            document.getElementById('info-decimal').textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            document.getElementById('info-dms').textContent = `${dmsLat} ${dmsLng}`;
            document.getElementById('info-plus').textContent = plusCode;
            document.getElementById('panel-info').style.display = 'block';
        }

        function ejecutarBusqueda() {
            const input = document.getElementById('buscador-input').value;
            const coordenadas = procesarEntrada(input);

            if (coordenadas) {
                const { lat, lng } = coordenadas;
                map.setView([lat, lng], 17);
                marcadorBusqueda.setLatLng([lat, lng]);
                if (!map.hasLayer(marcadorBusqueda)) {
                    map.addLayer(marcadorBusqueda);
                }
                actualizarPanelInfo(lat, lng);
            } else {
                alert('No se pudo identificar el formato. Comprueba el formato e intenta nuevamente.');
            }
        }

        // Eventos
        document.getElementById('btn-buscar').addEventListener('click', ejecutarBusqueda);
        document.getElementById('buscador-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') ejecutarBusqueda();
        });

        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            marcadorBusqueda.setLatLng([lat, lng]);
            if (!map.hasLayer(marcadorBusqueda)) {
                map.addLayer(marcadorBusqueda);
            }
            actualizarPanelInfo(lat, lng);
        });

        // Copiar rápido al portapapeles con Toast de confirmación
        function copiarTexto(idElemento) {
            const texto = document.getElementById(idElemento).textContent;
            navigator.clipboard.writeText(texto).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            });
        }
    </script>
</body>
</html>
