<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R3 Scripts</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #topbar {
            background: #1e293b;
            color: white;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            height: 52px;
            flex-shrink: 0;
        }
        #topbar h1 { font-size: 15px; font-weight: 700; color: white; white-space: nowrap; }
        #inventarioStatus { font-size: 12px; color: #94a3b8; }
        #tabs { display: flex; gap: 4px; margin-left: auto; }
        .tab-btn {
            padding: 6px 20px; border-radius: 6px; border: none;
            font-size: 13px; font-weight: 600; cursor: pointer;
            background: transparent; color: #94a3b8;
            font-family: inherit; width: auto; transition: all 0.15s;
        }
        .tab-btn:hover { background: #334155; color: white; }
        .tab-btn.active { background: #2563eb; color: white; }

        #view-lista, #view-mapa { flex: 1; overflow: hidden; display: none; flex-direction: column; }
        #view-lista.active, #view-mapa.active { display: flex; }

        /* ── Lista ── */
        #lista-scroll {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 14px; align-items: center;
        }
        .card {
            background: white; border-radius: 12px; border: 1px solid #e2e8f0;
            padding: 20px; width: 100%; max-width: 860px;
            box-shadow: 0 1px 3px rgb(0 0 0 / 0.06);
        }
        .card-title { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
        label { display: block; font-weight: 600; font-size: 13px; color: #64748b; margin-bottom: 6px; }
        textarea { width: 100%; height: 90px; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; font-size: 13px; resize: vertical; }
        textarea:focus { outline: 2px solid #93c5fd; border-color: #2563eb; }
        .btn-primary { background: #2563eb; color: white; border: none; padding: 11px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; font-family: inherit; width: 100%; transition: background 0.15s; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-ghost { background: #f1f5f9; color: #475569; border: none; padding: 9px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; font-family: inherit; width: 100%; margin-top: 8px; transition: background 0.15s; }
        .btn-ghost:hover { background: #e2e8f0; }

        #resultCounter { display: none; font-size: 13px; }
        #summaryStats { display: none; }
        #statsContent { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 10px; }
        .stat-card { background: #f1f5f9; padding: 12px; border-radius: 8px; border-left: 4px solid #2563eb; cursor: pointer; transition: transform 0.15s, background 0.15s; }
        .stat-card:hover { transform: scale(1.03); background: #e2e8f0; }

        #resultTable { width: 100%; max-width: 860px; border-collapse: separate; border-spacing: 0; background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; box-shadow: 0 1px 3px rgb(0 0 0 / 0.06); }
        #resultTable thead th { background: #1e293b; color: #f8fafc; text-align: left; padding: 13px 16px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; user-select: none; }
        #resultTable thead th:hover { background: #334155; }
        #resultTable tbody td { padding: 11px 16px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        #resultTable tbody tr:last-child td { border-bottom: none; }
        #resultTable tbody tr:hover { background: #f8faff; }
        .qr-badge { background: #fff7ed; color: #ea580c; padding: 3px 8px; border-radius: 6px; font-weight: 700; border: 1px solid #ffedd5; cursor: pointer; font-size: 12px; }
        .btn-ver-mapa { background: #2563eb; color: white; border: none; padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; transition: background 0.15s; }
        .btn-ver-mapa:hover { background: #1d4ed8; }
        .no-encontrada { background: #fff1f2 !important; color: #be123c; }

        /* ── Mapa ── */
        #mapa-toolbar {
            background: #1e293b; padding: 10px 20px;
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0;
        }
        #mapa-toolbar select,
        #mapa-toolbar input[type="text"] { padding: 6px 10px; border-radius: 6px; border: none; font-size: 13px; background: #334155; color: white; font-family: inherit; }
        #mapa-toolbar input[type="text"]::placeholder { color: #94a3b8; }
        #mapa-toolbar input[type="text"] { width: 110px; }
        #btn-ir { background: #ea580c; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
        #btn-ir:hover { background: #c2410c; }
        #btn-capas { background: #0f6e56; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }
        #btn-capas:hover { background: #085041; }
        #mapa-pin-info { font-size: 12px; color: #94a3b8; }

        /* ── Mapa contenedor ── */
        #mapa-body { flex: 1; display: flex; overflow: hidden; position: relative; }
        #map { flex: 1; }

        /* ── Panel capas ── */
        #panel-capas {
            width: 280px;
            background: white;
            border-left: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.25s ease;
            position: absolute;
            right: 0; top: 0; bottom: 0;
            z-index: 1000;
            box-shadow: -4px 0 12px rgb(0 0 0 / 0.1);
        }
        #panel-capas.abierto { transform: translateX(0); }

        #capas-header {
            background: #1e293b; color: white; padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        #capas-header span { font-size: 13px; font-weight: 700; }
        #btn-cerrar-capas { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 18px; padding: 0; width: auto; line-height: 1; }
        #btn-cerrar-capas:hover { color: white; }

        #capas-acciones { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; display: flex; gap: 8px; flex-shrink: 0; }
        .btn-capas-accion { flex: 1; background: #f1f5f9; color: #475569; border: none; padding: 6px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; }
        .btn-capas-accion:hover { background: #e2e8f0; }

        #capas-lista { flex: 1; overflow-y: auto; padding: 8px 0; }

        /* Carpeta raíz */
        .carpeta-root { border-bottom: 1px solid #f1f5f9; }
        .carpeta-root-header {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px; cursor: pointer;
            background: #f8fafc; user-select: none;
        }
        .carpeta-root-header:hover { background: #f1f5f9; }
        .carpeta-nombre-root { font-size: 13px; font-weight: 700; color: #1e293b; flex: 1; }
        .carpeta-toggle { font-size: 11px; color: #94a3b8; transition: transform 0.2s; }
        .carpeta-toggle.abierto { transform: rotate(90deg); }

        /* Subcarpetas */
        .subcarpetas { display: none; padding-left: 0; }
        .subcarpetas.visible { display: block; }

        .subcarpeta-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 14px 8px 28px;
        }
        .subcarpeta-item:hover { background: #f8faff; }
        .subcarpeta-item input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #2563eb; flex-shrink: 0; }
        .subcarpeta-nombre { font-size: 12px; color: #334155; flex: 1; line-height: 1.3; }
        .subcarpeta-count { font-size: 11px; color: #94a3b8; white-space: nowrap; }

        .carpeta-root-header input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #2563eb; flex-shrink: 0; }

        @media (max-width: 600px) {
            #lista-scroll { padding: 12px; }
            #mapa-toolbar { padding: 8px 12px; gap: 6px; }
            #mapa-toolbar input[type="text"] { width: 80px; }
            #panel-capas { width: 100%; }
        }
    </style>
</head>
<body>

<div id="topbar">
    <h1>⚡ R3 Scripts</h1>
    <span id="inventarioStatus">⏳ Cargando inventario...</span>
    <div id="tabs">
        <button class="tab-btn active" onclick="switchTab('lista')">📋 Lista</button>
        <button class="tab-btn" onclick="switchTab('mapa')">🗺 Mapa</button>
    </div>
</div>

<div id="view-lista" class="active">
    <div id="lista-scroll">
        <div class="card">
            <div class="card-title">Cargar clientes</div>
            <div style="display:flex; gap:14px; flex-wrap:wrap; margin-bottom:14px;">
                <div style="flex:1; min-width:180px;">
                    <label>Subir CSV</label>
                    <input type="file" id="clientCsvFile" accept=".csv">
                </div>
                <div style="flex:1; min-width:180px;">
                    <label>Pegar reporte</label>
                    <textarea id="reportInput" placeholder="Pega aquí el reporte..."></textarea>
                </div>
            </div>
            <button class="btn-primary" onclick="procesarBusqueda()" id="btnBuscar">🔍 Localizar QRs</button>
            <button class="btn-ghost" onclick="limpiarTodo()">🗑 Limpiar resultados</button>
        </div>

        <div id="resultCounter" class="card" style="padding:12px 16px;"></div>

        <div id="summaryStats" class="card">
            <div class="card-title">📊 Resumen de impacto por QR</div>
            <div id="statsContent"></div>
        </div>

        <table id="resultTable">
            <thead>
                <tr>
                    <th onclick="ordenarTabla(0)">Estado ↕</th>
                    <th onclick="ordenarTabla(1)">Cuenta ↕</th>
                    <th onclick="ordenarTabla(2)">QR ↕</th>
                    <th>Coordenadas</th>
                    <th>Mapa</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="view-mapa">
    <div id="mapa-toolbar">
        <select id="kmzSelect">
            <option value="">— KMZ —</option>
            <option value="ALDAMA_1.kmz">Aldama 1</option>
            <option value="ALDAMA_2.kmz">Aldama 2</option>
        </select>
        <input type="file" id="fileInput" accept=".kmz" title="Subir KMZ" style="font-size:11px;color:#94a3b8;width:110px;">
        <input type="text" id="latInput" placeholder="Latitud">
        <input type="text" id="lngInput" placeholder="Longitud">
        <button id="btn-ir">📍 Ir</button>
        <button id="btn-capas" onclick="togglePanelCapas()">🗂 Capas</button>
        <span id="mapa-pin-info"></span>
    </div>
    <div id="mapa-body">
        <div id="map"></div>
        <div id="panel-capas">
            <div id="capas-header">
                <span>🗂 Capas del KMZ</span>
                <button id="btn-cerrar-capas" onclick="togglePanelCapas()">✕</button>
            </div>
            <div id="capas-acciones">
                <!-- Se agregó la lógica a los botones "Todas" y "Ninguna" -->
                <button class="btn-capas-accion" onclick="toggleTodasCapas(true)">✅ Todas</button>
                <button class="btn-capas-accion" onclick="toggleTodasCapas(false)">⬜ Ninguna</button>
            </div>
            <div id="capas-lista"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="app.js?v=100"></script>
<script>
    var mapaIniciado = false;
    var map, pinActual;
    window.carpetasData = {}; 
    const BASE_URL = 'https://raw.githack.com/Totalitoplay/kmz-finder/main/';

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('#view-lista, #view-mapa').forEach(v => v.classList.remove('active'));
        const btn = document.querySelector('.tab-btn[onclick="switchTab(\'' + tab + '\')"]');
        if(btn) btn.classList.add('active');
        document.getElementById('view-' + tab).classList.add('active');
        if (tab === 'mapa') {
            if (!mapaIniciado) { iniciarMapa(); mapaIniciado = true; }
            else setTimeout(() => map.invalidateSize(), 100);
        }
    }

    function togglePanelCapas() {
        document.getElementById('panel-capas').classList.toggle('abierto');
    }

    // 🔥 Agregada la función faltante para los botones "Todas" / "Ninguna"
    function toggleTodasCapas(visible) {
        Object.values(window.carpetasData).forEach(carpeta => {
            Object.values(carpeta.subcarpetas).forEach(sub => {
                if (visible) map.addLayer(sub.layerGroup);
                else map.removeLayer(sub.layerGroup);
            });
        });
        document.querySelectorAll('#capas-lista input[type="checkbox"]').forEach(cb => cb.checked = visible);
    }

    function iniciarMapa() {
        map = L.map('map').setView([25.68, -100.31], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

        document.getElementById('kmzSelect').addEventListener('change', function() {
            if (this.value) cargarKMZDesdeURL(this.value);
        });
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0]; if (!file) return;
            setPinInfo('Cargando ' + file.name + '...');
            const buffer = await file.arrayBuffer();
            await parsearKMZ(buffer);
            setPinInfo(file.name + ' ✓');
        });
        document.getElementById('btn-ir').addEventListener('click', irManual);
    }

    function setPinInfo(txt) { document.getElementById('mapa-pin-info').textContent = txt; }

    function irManual() {
        const lat = parseFloat(document.getElementById('latInput').value);
        const lng = parseFloat(document.getElementById('lngInput').value);
        if (isNaN(lat) || isNaN(lng)) { setPinInfo('Coords inválidas'); return; }
        irACoordenadas(lat, lng, lat + ', ' + lng);
    }

    function irACoordenadas(lat, lng, label) {
        if (!mapaIniciado) { iniciarMapa(); mapaIniciado = true; }
        switchTab('mapa');
        setTimeout(() => {
            map.invalidateSize();
            if (pinActual) map.removeLayer(pinActual);
            pinActual = L.marker([lat, lng]).addTo(map);
            pinActual.bindPopup('<b>' + (label || '') + '</b>').openPopup();
            map.setView([lat, lng], 16);
        }, 150);
    }

    async function cargarKMZDesdeURL(filename) {
        setPinInfo('Cargando ' + filename + '...');
        try {
            const r = await fetch(BASE_URL + filename);
            if (!r.ok) throw new Error('Error al descargar archivo');
            await parsearKMZ(await r.arrayBuffer());
            setPinInfo(filename + ' ✓');
        } catch (err) { setPinInfo('Error: ' + err.message); }
    }

    async function parsearKMZ(buffer) {
        if (window.carpetasData) {
            Object.values(window.carpetasData).forEach(c => {
                Object.values(c.subcarpetas).forEach(s => map.removeLayer(s.layerGroup));
            });
        }
        window.carpetasData = {};

        const zip = await JSZip.loadAsync(buffer);
        const kmlFile = Object.values(zip.files).find(f => f.name.toLowerCase().endsWith('.kml'));
        if (!kmlFile) { alert('No se encontró KML'); return; }

        let kmlText = await kmlFile.async('string');
        kmlText = kmlText.replace(/xmlns(:\w+)?="[^"]*"/g, '');
        
        const kmlDoc = new DOMParser().parseFromString(kmlText, 'text/xml');
        const todosLosBounds = [];

        function extraerCoords(str) {
            if (!str) return [];
            const limpia = str.replace(/[\t\n\r]/g, ' ').trim();
            return limpia.split(/\s+/).map(s => {
                const p = s.split(',').map(Number);
                return (p.length >= 2 && !isNaN(p[0])) ? [p[1], p[0]] : null;
            }).filter(Boolean);
        }

        // 🔥 DIBUJA PUNTOS, LÍNEAS Y ÁREAS POR IGUAL
        function crearLayer(pm) {
            const layers = [];
            const nameNode = pm.getElementsByTagName('name')[0];
            const name = nameNode ? nameNode.textContent.trim() : 'Sin nombre';

            // Marcadores
            const points = pm.getElementsByTagName('Point');
            for(let i = 0; i < points.length; i++) {
                const coordsNode = points[i].getElementsByTagName('coordinates')[0];
                if (coordsNode) {
                    const c = extraerCoords(coordsNode.textContent);
                    if (c[0]) {
                        const m = L.circleMarker(c[0], { radius: 6, color: '#fff', fillColor: '#ea580c', fillOpacity: 1, weight: 2 });
                        m.bindPopup(`<b>${name}</b>`);
                        layers.push(m);
                    }
                }
            }

            // Rutas / Líneas
            const lines = pm.getElementsByTagName('LineString');
            for(let i = 0; i < lines.length; i++) {
                const coordsNode = lines[i].getElementsByTagName('coordinates')[0];
                if (coordsNode) {
                    const c = extraerCoords(coordsNode.textContent);
                    if (c.length > 1) {
                        const l = L.polyline(c, { color: '#3b82f6', weight: 4 });
                        l.bindPopup(`<b>${name}</b>`);
                        layers.push(l);
                    }
                }
            }

            // Áreas / Polígonos
            const polys = pm.getElementsByTagName('Polygon');
            for(let i = 0; i < polys.length; i++) {
                const coordsNode = polys[i].getElementsByTagName('coordinates')[0];
                if (coordsNode) {
                    const c = extraerCoords(coordsNode.textContent);
                    if (c.length > 2) {
                        const p = L.polygon(c, { color: '#10b981', fillOpacity: 0.4 });
                        p.bindPopup(`<b>${name}</b>`);
                        layers.push(p);
                    }
                }
            }
            return layers;
        }

        // 🔥 BÚSQUEDA GLOBAL (Soluciona cualquier nivel de carpetas)
        const placemarks = kmlDoc.getElementsByTagName('Placemark');
        
        for (let i = 0; i < placemarks.length; i++) {
            const pm = placemarks[i];
            
            // Subir por el árbol para armar la ruta de carpetas
            let path = [];
            let curr = pm.parentNode;
            while (curr && curr.nodeName !== 'Document' && curr.nodeName !== 'kml' && curr.nodeName !== '#document') {
                if (curr.nodeName === 'Folder') {
                    let folderName = 'Carpeta';
                    for(let j=0; j<curr.childNodes.length; j++) {
                        if(curr.childNodes[j].nodeName === 'name') {
                            folderName = curr.childNodes[j].textContent.trim();
                            break;
                        }
                    }
                    path.unshift(folderName);
                }
                curr = curr.parentNode;
            }

            // Asignar nombres principales y secundarios
            let rName = 'General';
            let sName = 'General';

            if (path.length === 1) {
                rName = path[0];
                sName = path[0];
            } else if (path.length >= 2) {
                rName = path[0]; // La carpeta de más arriba
                sName = path[path.length - 1]; // La carpeta más cercana al punto
            }

            // Crear el layer group dinámicamente si no existe
            if (!window.carpetasData[rName]) window.carpetasData[rName] = { subcarpetas: {} };
            if (!window.carpetasData[rName].subcarpetas[sName]) {
                window.carpetasData[rName].subcarpetas[sName] = { layerGroup: L.layerGroup().addTo(map), count: 0 };
            }

            // Añadir al mapa
            const layers = crearLayer(pm);
            layers.forEach(l => {
                l.addTo(window.carpetasData[rName].subcarpetas[sName].layerGroup);
                window.carpetasData[rName].subcarpetas[sName].count++;
                
                if (l.getLatLng) todosLosBounds.push(l.getLatLng());
                else if (l.getBounds) {
                    const b = l.getBounds();
                    if (b.isValid()) {
                        todosLosBounds.push(b.getNorthEast(), b.getSouthWest());
                    }
                }
            });
        }

        if (todosLosBounds.length) {
            map.fitBounds(L.latLngBounds(todosLosBounds), { padding: [30, 30] });
        } else {
            alert("Se leyó el archivo pero no contiene ni Puntos, Líneas o Polígonos compatibles.");
        }

        renderizarPanelCapas();
    }

    function renderizarPanelCapas() {
        const lista = document.getElementById('capas-lista');
        lista.innerHTML = '';
        Object.entries(window.carpetasData).forEach(([rName, data]) => {
            const div = document.createElement('div');
            div.className = 'carpeta-root';
            div.innerHTML = `<div class="carpeta-root-header"><b>${rName}</b></div>`;
            
            Object.entries(data.subcarpetas).forEach(([sName, sData]) => {
                // Escapar nombres para no romper el HTML
                const rSafe = rName.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const sSafe = sName.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                
                const sDiv = document.createElement('div');
                sDiv.className = 'subcarpeta-item';
                sDiv.innerHTML = `
                    <input type="checkbox" checked onchange="toggleCapa('${rSafe}','${sSafe}', this.checked)">
                    <span class="subcarpeta-nombre">${sName} (${sData.count})</span>
                `;
                div.appendChild(sDiv);
            });
            lista.appendChild(div);
        });
    }

    function toggleCapa(r, s, v) {
        const layer = window.carpetasData[r].subcarpetas[s].layerGroup;
        if (v) map.addLayer(layer); else map.removeLayer(layer);
    }

    function renderizarTabla(datos) {
        const tbody = document.querySelector('#resultTable tbody');
        if (!datos.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#64748b;">😕 Sin resultados</td></tr>';
            return;
        }
        tbody.innerHTML = datos.map(res => {
            if (res.encontrado) {
                const lat = parseFloat(res.lat), lng = parseFloat(res.lon);
                return `<tr>
                    <td data-label="ESTADO">✅</td>
                    <td data-label="CUENTA"><b>${res.cuenta}</b></td>
                    <td data-label="QR"><span class="qr-badge" onclick="copiarQR('${res.qr}', this)" title="Tap para copiar">${res.qr}</span></td>
                    <td data-label="COORD" style="font-size:11px;color:#64748b;">${res.lat}, ${res.lon}</td>
                    <td><button class="btn-ver-mapa" onclick="irACoordenadas(${lat},${lng},'${res.qr} · ${res.cuenta}')">🗺 Ver</button></td>
                </tr>`;
            } else {
                return `<tr class="no-encontrada">
                    <td>❌</td><td>${res.cuenta}</td><td colspan="3">No encontrada en inventario</td>
                </tr>`;
            }
        }).join('');
    }

    function mostrarResumen(conteo) {
        const contenedorStats = document.getElementById('summaryStats');
        const contenido = document.getElementById('statsContent');
        const ordenados = Object.entries(conteo).sort((a, b) => b[1] - a[1]);
        if (!ordenados.length) { contenedorStats.style.display = 'none'; return; }
        contenedorStats.style.display = 'block';
        contenido.innerHTML = ordenados.map(([qr, total]) => {
            const dato = resultadosActuales.find(r => r.qr === qr && r.encontrado);
            const lat = dato ? parseFloat(dato.lat) : null;
            const lng = dato ? parseFloat(dato.lon) : null;
            const click = lat ? `irACoordenadas(${lat},${lng},'${qr}')` : '';
            return `<div class="stat-card" onclick="${click}">
                <span style="font-size:10px;font-weight:700;color:#2563eb;display:block;margin-bottom:4px;">🗺 VER MAPA</span>
                <span style="font-size:12px;font-weight:700;color:#1e293b;display:block;border-bottom:1px dashed #cbd5e1;padding-bottom:4px;margin-bottom:4px;">${qr}</span>
                <div style="font-size:20px;font-weight:700;color:#1e293b;">${total} <small style="font-size:10px;color:#64748b;">ctes</small></div>
            </div>`;
        }).join('');
    }
</script>
</body>
</html>
