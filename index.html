<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Clusters y Coordenadas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #mapa { width: 100%; height: 100vh; }

        /* Contenedor flotante superior */
        #panel-control {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            backdrop-filter: blur(5px);
        }

        .busqueda-grupo {
            display: flex;
            gap: 8px;
        }

        #buscador-input {
            flex-grow: 1;
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        #buscador-input:focus {
            border-color: #007bff;
        }

        #btn-buscar {
            padding: 10px 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        #btn-buscar:hover {
            background-color: #0056b3;
        }

        /* Panel de resultados de conversión */
        #panel-info {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid #eee;
            display: none; /* Se muestra al buscar o hacer clic */
        }

        .info-item {
            font-size: 13px;
            margin: 4px 0;
            color: #333;
        }

        .info-item strong {
            color: #555;
            display: inline-block;
            width: 90px;
        }

        .coordenada-copiar {
            background: #f1f3f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="panel-control">
        <div class="busqueda-grupo">
            <input type="text" id="buscador-input" placeholder="Ej: 31.735, -106.481 | 31°44'6&quot;N 106°28'51&quot;W | 8599+3G">
            <button id="btn-buscar">Buscar</button>
        </div>
        <div id="panel-info">
            <div class="info-item"><strong>Decimal:</strong> <span id="info-decimal" class="coordenada-copiar"></span></div>
            <div class="info-item"><strong>DMS:</strong> <span id="info-dms" class="coordenada-copiar"></span></div>
            <div class="info-item"><strong>Plus Code:</strong> <span id="info-plus" class="coordenada-copiar"></span></div>
        </div>
    </div>

    <div id="mapa"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-kml@1.0.0/L.KML.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/open-location-code@1.0.4/openlocationcode.min.js"></script>

    <script>
        // 1. Configuración de capas base (Calles y Satélite)
        var capaCalles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        });

        var capaSatelite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS'
        });

        // Inicializar mapa centrado por defecto en coordenadas base
        var map = L.map('mapa', {
            center: [31.735, -106.481],
            zoom: 13,
            layers: [capaSatelite] // Satélite por defecto
        });

        // Control de capas para alternar fácilmente en la esquina superior derecha
        var capasBase = {
            "Satelital (Híbrido)": capaSatelite,
            "Calles (OSM)": capaCalles
        };
        L.control.layers(capasBase, null, { position: 'topright' }).addTo(map);

        // Marcador dinámico para las búsquedas
        var marcadorBusqueda = L.marker([0, 0]).addTo(map);
        map.removeLayer(marcadorBusqueda); // Ocultar al inicio

        // 2. Cargar el KML respetando los estilos originales
        fetch('CLUSTERS.kml')
            .then(res => res.text())
            .then(kmltext => {
                const parser = new DOMParser();
                const kml = parser.parseFromString(kmltext, 'text/xml');
                const capaKml = new L.KML(kml);
                map.addLayer(capaKml);
                
                const limites = capaKml.getBounds();
                if (limites.isValid()) {
                    map.fitBounds(limites);
                }
            })
            .catch(err => console.error('Error al cargar archivo KML:', err));

        // 3. Funciones de Conversión de Coordenadas
        function dmsToDecimal(degrees, minutes, seconds, direction) {
            let dd = parseFloat(degrees) + parseFloat(minutes)/60 + parseFloat(seconds)/3600;
            if (direction === 'S' || direction === 'W' || direction === 'O') {
                dd = dd * -1;
            }
            return dd;
        }

        function decimalToDMS(dd, isLat) {
            const dir = dd < 0 ? (isLat ? 'S' : 'W') : (isLat ? 'N' : 'E');
            const absDd = Math.abs(dd);
            const deg = Math.floor(absDd);
            const minFrac = (absDd - deg) * 60;
            const min = Math.floor(minFrac);
            const sec = ((minFrac - min) * 60).toFixed(2);
            return `${deg}° ${min}' ${sec}" ${dir}`;
        }

        // 4. Analizador Inteligente de Entrada (Soporta Decimal, DMS y Plus Code)
        function procesarEntrada(texto) {
            texto = texto.trim();

            // CASO A: Plus Code (contiene un signo "+")
            if (texto.includes('+')) {
                let codigoLimpio = texto.split(/[\s,]+/)[0];
                // Si el Plus Code es corto (local), usamos las coordenadas de Juárez para completarlo automáticamente
                if (openLocationCode.isShort(codigoLimpio)) {
                    codigoLimpio = openLocationCode.recoverNearest(codigoLimpio, 31.735, -106.481);
                }
                if (openLocationCode.isValid(codigoLimpio)) {
                    const decodificado = openLocationCode.decode(codigoLimpio);
                    return { lat: decodificado.latitudeCenter, lng: decodificado.longitudeCenter };
                }
            }

            // CASO B: Grados, Minutos y Segundos (DMS) - Soporta N, S, E, W u O
            const regexDMS = /(\d+(?:\.\d+)?)[°\s]+(\d+(?:\.\d+)?)[′''\s]+(\d+(?:\.\d+)?)"?[″""\s]*([NSEWO])/gi;
            const matches = [...texto.matchAll(regexDMS)];
            if (matches.length === 2) {
                const lat = dmsToDecimal(matches[0][1], matches[0][2], matches[0][3], matches[0][4].toUpperCase());
                const lng = dmsToDecimal(matches[1][1], matches[1][2], matches[1][3], matches[1][4].toUpperCase());
                return { lat, lng };
            }

            // CASO C: Decimales directos (ej: 31.735, -106.481 o separados por espacios)
            const cleanStr = texto.replace(/[,;]/g, ' ');
            const partes = cleanStr.trim().split(/\s+/);
            if (partes.length === 2) {
                const lat = parseFloat(partes[0]);
                const lng = parseFloat(partes[1]);
                if (!isNaN(lat) && !isNaN(lng) && lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
                    return { lat, lng };
                }
            }

            return null;
        }

        // Actualiza el panel de información visual con todas las conversiones
        function actualizarPanelInfo(lat, lng) {
            const dmsLat = decimalToDMS(lat, true);
            const dmsLng = decimalToDMS(lng, false);
            const plusCode = openLocationCode.encode(lat, lng);

            document.getElementById('info-decimal').textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            document.getElementById('info-dms').textContent = `${dmsLat} ${dmsLng}`;
            document.getElementById('info-plus').textContent = plusCode;
            document.getElementById('panel-info').style.display = 'block';
        }

        // Ejecutar búsqueda e ir al punto seleccionado
        function ejecutarBusqueda() {
            const input = document.getElementById('buscador-input').value;
            const coordenadas = procesarEntrada(input);

            if (coordenadas) {
                const { lat, lng } = coordenadas;
                map.setView([lat, lng], 17); // Zoom cerrado en el punto de interés
                
                marcadorBusqueda.setLatLng([lat, lng]);
                if (!map.hasLayer(marcadorBusqueda)) {
                    map.addLayer(marcadorBusqueda);
                }
                
                actualizarPanelInfo(lat, lng);
            } else {
                alert('No se pudo interpretar el formato de coordenadas. Asegúrate de incluir indicadores cardinales (N,S,E,W/O) o un Plus Code válido.');
            }
        }

        // Eventos de búsqueda
        document.getElementById('btn-buscar').addEventListener('click', ejecutarBusqueda);
        document.getElementById('buscador-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') ejecutarBusqueda();
        });

        // 5. Interacción con clic en el mapa (Obtener coordenadas en vivo)
        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;

            marcadorBusqueda.setLatLng([lat, lng]);
            if (!map.hasLayer(marcadorBusqueda)) {
                map.addLayer(marcadorBusqueda);
            }

            actualizarPanelInfo(lat, lng);
        });
    </script>
</body>
</html>
