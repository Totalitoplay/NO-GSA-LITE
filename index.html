<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R3 Scripts</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Topbar ── */
        #topbar {
            background: #1e293b;
            color: white;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            height: 52px;
            flex-shrink: 0;
        }
        #topbar h1 { font-size: 15px; font-weight: 700; color: white; white-space: nowrap; }
        #inventarioStatus { font-size: 12px; color: #94a3b8; }
        #tabs { display: flex; gap: 4px; margin-left: auto; }
        .tab-btn {
            padding: 6px 20px; border-radius: 6px; border: none;
            font-size: 13px; font-weight: 600; cursor: pointer;
            background: transparent; color: #94a3b8;
            font-family: inherit; width: auto; transition: all 0.15s;
        }
        .tab-btn:hover { background: #334155; color: white; }
        .tab-btn.active { background: #2563eb; color: white; }

        /* ── Vistas ── */
        #view-lista, #view-mapa {
            flex: 1; overflow: hidden; display: none; flex-direction: column;
        }
        #view-lista.active, #view-mapa.active { display: flex; }

        /* ── Lista ── */
        #lista-scroll {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 14px; align-items: center;
        }
        .card {
            background: white; border-radius: 12px; border: 1px solid #e2e8f0;
            padding: 20px; width: 100%; max-width: 860px;
            box-shadow: 0 1px 3px rgb(0 0 0 / 0.06);
        }
        .card-title {
            font-size: 12px; font-weight: 700; color: #64748b;
            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px;
        }
        label { display: block; font-weight: 600; font-size: 13px; color: #64748b; margin-bottom: 6px; }
        textarea {
            width: 100%; height: 90px; padding: 10px 12px;
            border: 1px solid #cbd5e1; border-radius: 8px;
            font-family: inherit; font-size: 13px; resize: vertical;
        }
        textarea:focus { outline: 2px solid #93c5fd; border-color: #2563eb; }
        .btn-primary {
            background: #2563eb; color: white; border: none; padding: 11px 20px;
            border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px;
            font-family: inherit; width: 100%; transition: background 0.15s;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-ghost {
            background: #f1f5f9; color: #475569; border: none; padding: 9px 20px;
            border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px;
            font-family: inherit; width: 100%; margin-top: 8px; transition: background 0.15s;
        }
        .btn-ghost:hover { background: #e2e8f0; }

        #resultCounter { display: none; font-size: 13px; }
        #summaryStats { display: none; }
        #statsContent {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px; margin-top: 10px;
        }
        .stat-card {
            background: #f1f5f9; padding: 12px; border-radius: 8px;
            border-left: 4px solid #2563eb; cursor: pointer;
            transition: transform 0.15s, background 0.15s;
        }
        .stat-card:hover { transform: scale(1.03); background: #e2e8f0; }

        #resultTable {
            width: 100%; max-width: 860px; border-collapse: separate; border-spacing: 0;
            background: white; border-radius: 12px; overflow: hidden;
            border: 1px solid #e2e8f0; box-shadow: 0 1px 3px rgb(0 0 0 / 0.06);
        }
        #resultTable thead th {
            background: #1e293b; color: #f8fafc; text-align: left;
            padding: 13px 16px; font-size: 12px; text-transform: uppercase;
            letter-spacing: 0.05em; cursor: pointer; user-select: none;
        }
        #resultTable thead th:hover { background: #334155; }
        #resultTable tbody td { padding: 11px 16px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        #resultTable tbody tr:last-child td { border-bottom: none; }
        #resultTable tbody tr:hover { background: #f8faff; }
        .qr-badge {
            background: #fff7ed; color: #ea580c; padding: 3px 8px; border-radius: 6px;
            font-weight: 700; border: 1px solid #ffedd5; cursor: pointer; font-size: 12px;
        }
        .btn-ver-mapa {
            background: #2563eb; color: white; border: none; padding: 5px 12px;
            border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
            font-family: inherit; white-space: nowrap; transition: background 0.15s;
        }
        .btn-ver-mapa:hover { background: #1d4ed8; }
        .no-encontrada { background: #fff1f2 !important; color: #be123c; }

        /* ── Mapa ── */
        #mapa-toolbar {
            background: #1e293b; padding: 10px 20px;
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0;
        }
        #mapa-toolbar select,
        #mapa-toolbar input[type="text"] {
            padding: 6px 10px; border-radius: 6px; border: none;
            font-size: 13px; background: #334155; color: white; font-family: inherit;
        }
        #mapa-toolbar input[type="text"]::placeholder { color: #94a3b8; }
        #mapa-toolbar input[type="text"] { width: 110px; }
        #btn-ir {
            background: #ea580c; color: white; border: none; padding: 6px 14px;
            border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
        }
        #btn-ir:hover { background: #c2410c; }
        #btn-capas {
            background: #0f6e56; color: white; border: none; padding: 6px 14px;
            border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: inherit; white-space: nowrap;
        }
        #btn-capas:hover { background: #085041; }
        #mapa-pin-info { font-size: 12px; color: #94a3b8; }

        #mapa-body { flex: 1; display: flex; overflow: hidden; position: relative; }
        #map { flex: 1; }

        /* ── Panel capas ── */
        #panel-capas {
            width: 300px; background: white; border-left: 1px solid #e2e8f0;
            display: flex; flex-direction: column;
            transform: translateX(100%); transition: transform 0.25s ease;
            position: absolute; right: 0; top: 0; bottom: 0; z-index: 1000;
            box-shadow: -4px 0 12px rgb(0 0 0 / 0.1);
        }
        #panel-capas.abierto { transform: translateX(0); }

        #capas-header {
            background: #1e293b; color: white; padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        #capas-header span { font-size: 13px; font-weight: 700; }
        #btn-cerrar-capas {
            background: none; border: none; color: #94a3b8; cursor: pointer;
            font-size: 18px; padding: 0; width: auto; line-height: 1;
        }
        #btn-cerrar-capas:hover { color: white; }

        #capas-acciones {
            padding: 10px 14px; border-bottom: 1px solid #f1f5f9;
            display: flex; gap: 8px; flex-shrink: 0;
        }
        .btn-capas-accion {
            flex: 1; background: #f1f5f9; color: #475569; border: none;
            padding: 6px 8px; border-radius: 6px; font-size: 12px; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: background 0.15s;
        }
        .btn-capas-accion:hover { background: #e2e8f0; }

        #capas-lista { flex: 1; overflow-y: auto; }

        /* Nivel 1 */
        .n1-header {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px; cursor: pointer; background: #f1f5f9;
            border-bottom: 1px solid #e2e8f0; user-select: none;
        }
        .n1-header:hover { background: #e2e8f0; }
        .n1-nombre { font-size: 13px; font-weight: 700; color: #1e293b; flex: 1; }

        /* Nivel 2 */
        .n2-header {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 14px 8px 26px; cursor: pointer; background: #f8fafc;
            border-bottom: 1px solid #f1f5f9; user-select: none;
        }
        .n2-header:hover { background: #f1f5f9; }
        .n2-nombre { font-size: 12px; font-weight: 600; color: #334155; flex: 1; }

        /* Nivel 3 */
        .n3-item {
            display: flex; align-items: center; gap: 8px;
            padding: 7px 14px 7px 40px; border-bottom: 1px solid #f8fafc;
            transition: background 0.15s;
        }
        .n3-item:hover { background: #f8faff; }
        .n3-item.resaltado { background: #dbeafe !important; }
        .n3-nombre { font-size: 12px; color: #475569; flex: 1; line-height: 1.3; }
        .n3-count { font-size: 11px; color: #94a3b8; white-space: nowrap; }

        .carpeta-toggle { font-size: 10px; color: #94a3b8; transition: transform 0.2s; flex-shrink: 0; }
        .carpeta-toggle.abierto { transform: rotate(90deg); }

        .subcarpetas { display: none; }
        .subcarpetas.visible { display: block; }

        input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; accent-color: #2563eb; flex-shrink: 0; }

        @media (max-width: 600px) {
            #lista-scroll { padding: 12px; }
            #mapa-toolbar { padding: 8px 12px; gap: 6px; }
            #mapa-toolbar input[type="text"] { width: 80px; }
            #panel-capas { width: 100%; }
        }
    </style>
</head>
<body>

<div id="topbar">
    <h1>⚡ R3 Scripts</h1>
    <span id="inventarioStatus">⏳ Cargando inventario...</span>
    <div id="tabs">
        <button class="tab-btn active" onclick="switchTab('lista')">📋 Lista</button>
        <button class="tab-btn" onclick="switchTab('mapa')">🗺 Mapa</button>
    </div>
</div>

<!-- Vista Lista -->
<div id="view-lista" class="active">
    <div id="lista-scroll">
        <div class="card">
            <div class="card-title">Cargar clientes</div>
            <div style="display:flex; gap:14px; flex-wrap:wrap; margin-bottom:14px;">
                <div style="flex:1; min-width:180px;">
                    <label>Subir CSV</label>
                    <input type="file" id="clientCsvFile" accept=".csv">
                </div>
                <div style="flex:1; min-width:180px;">
                    <label>Pegar reporte</label>
                    <textarea id="reportInput" placeholder="Pega aquí el reporte..."></textarea>
                </div>
            </div>
            <button class="btn-primary" onclick="procesarBusqueda()" id="btnBuscar">🔍 Localizar QRs</button>
            <button class="btn-ghost" onclick="limpiarTodo()">🗑 Limpiar resultados</button>
        </div>

        <div id="resultCounter" class="card" style="padding:12px 16px;"></div>

        <div id="summaryStats" class="card">
            <div class="card-title">📊 Resumen de impacto por QR</div>
            <div id="statsContent"></div>
        </div>

        <table id="resultTable">
            <thead>
                <tr>
                    <th onclick="ordenarTabla(0)">Estado ↕</th>
                    <th onclick="ordenarTabla(1)">Cuenta ↕</th>
                    <th onclick="ordenarTabla(2)">QR ↕</th>
                    <th>Coordenadas</th>
                    <th>Mapa</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<!-- Vista Mapa -->
<div id="view-mapa">
    <div id="mapa-toolbar">
        <select id="kmzSelect">
            <option value="">— KMZ —</option>
            <option value="ALDAMA_1.kmz">Aldama 1</option>
            <option value="ALDAMA_2.kmz">Aldama 2</option>
        </select>
        <input type="file" id="fileInput" accept=".kmz" title="Subir KMZ" style="font-size:11px;color:#94a3b8;width:110px;">
        <input type="text" id="latInput" placeholder="Latitud">
        <input type="text" id="lngInput" placeholder="Longitud">
        <button id="btn-ir">📍 Ir</button>
        <button id="btn-capas" onclick="togglePanelCapas()">🗂 Capas</button>
        <span id="mapa-pin-info"></span>
    </div>
    <div id="mapa-body">
        <div id="map"></div>
        <div id="panel-capas">
            <div id="capas-header">
                <span>🗂 Capas del KMZ</span>
                <button id="btn-cerrar-capas" onclick="togglePanelCapas()">✕</button>
            </div>
        
            <div style="padding: 10px 14px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                <input type="text" id="buscador-capas" placeholder="Buscar código (ej. ALD-1D)..." 
                       onkeyup="filtrarCapas(this.value)" 
                       style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 12px; outline: none;">
            </div>
            <div id="capas-acciones">
                <button class="btn-capas-accion" onclick="toggleTodasCapas(true)">✅ Todas</button>
                <button class="btn-capas-accion" onclick="toggleTodasCapas(false)">⬜ Ninguna</button>
            </div>
            <div id="capas-lista"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="app.js?v=100"></script>
<script>
    var mapaIniciado = false;
    var map, pinActual;
    var carpetasData = {}; // { r: { s: { ss: { layerGroup, count } } } }
    const BASE_URL = '/kmz/';

    /* ── Tabs ── */
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('#view-lista, #view-mapa').forEach(v => v.classList.remove('active'));
        document.querySelector('.tab-btn[onclick="switchTab(\'' + tab + '\')"]').classList.add('active');
        document.getElementById('view-' + tab).classList.add('active');
        if (tab === 'mapa') {
            if (!mapaIniciado) { iniciarMapa(); mapaIniciado = true; }
            else setTimeout(() => map.invalidateSize(), 100);
        }
    }

    /* ── Panel capas ── */
    function togglePanelCapas() {
        document.getElementById('panel-capas').classList.toggle('abierto');
        setTimeout(() => map.invalidateSize(), 300);
    }

    function toggleFolder(uid, event) {
        if (event) event.stopPropagation();
        const sub = document.getElementById(uid);
        const toggle = document.getElementById('toggle_' + uid);
        if (sub) sub.classList.toggle('visible');
        if (toggle) toggle.classList.toggle('abierto');
    }

    function esc(s) { 
    return String(s)
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/"/g, '&quot;'); // Evita que se rompan los atributos HTML
    }

    function toggleNivel(elemento) {
        // 1. Detectar si la orden viene de un clic (elemento) o del botón "Todas" (booleano)
        const visible = typeof elemento === 'boolean' ? elemento : elemento.checked;
    
        // 2. Efecto Cascada: Si damos clic en una carpeta (Nivel 1 o 2), marcamos/desmarcamos sus hijos
        if (typeof elemento !== 'boolean') {
            const contenedorPadre = elemento.closest('.n1-header, .n2-header');
            if (contenedorPadre) {
                const subcarpetas = contenedorPadre.nextElementSibling;
                if (subcarpetas && subcarpetas.classList.contains('subcarpetas')) {
                    subcarpetas.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = visible);
                }
            }
        }
    
        // 3. Sincronización Real: Leemos el DOM y actualizamos el mapa (Evita desincronización)
        document.querySelectorAll('.n3-item').forEach(item => {
            const cb = item.querySelector('input[type="checkbox"]');
            if (!cb) return;
            
            // Obtenemos los nombres exactos guardados en memoria, sin importar símbolos raros
            const dataR = item.dataset.r;
            const dataS = item.dataset.s;
            const dataSS = item.dataset.ss;
            
            // Buscamos la capa en memoria
            const capa = carpetasData[dataR] && carpetasData[dataR][dataS] && carpetasData[dataR][dataS][dataSS];
            
            if (capa) {
                if (cb.checked) {
                    map.addLayer(capa.layerGroup);
                } else {
                    map.removeLayer(capa.layerGroup);
                }
            }
        });
    }

    function toggleTodasCapas(visible) {
        document.querySelectorAll('#capas-lista input[type="checkbox"]').forEach(cb => cb.checked = visible);
        toggleNivel(visible); // Esto fuerza la actualización del mapa
    }

    function resaltarCarpeta(r, s, ss) {
        document.getElementById('panel-capas').classList.add('abierto');
        setTimeout(() => map.invalidateSize(), 300);

        // Quitar resaltados
        document.querySelectorAll('.n3-item').forEach(el => el.classList.remove('resaltado'));

        // Encontrar y resaltar
        document.querySelectorAll('.n3-item').forEach(item => {
            if (item.dataset.r === r && item.dataset.s === s && item.dataset.ss === ss) {
                item.classList.add('resaltado');
                item.scrollIntoView({ behavior: 'smooth', block: 'center' });

                // Expandir padres si están cerrados
                const uid2 = item.closest('.subcarpetas')?.id;
                const uid1 = item.closest('.subcarpetas')?.closest('.subcarpetas')?.id;
                if (uid2) { document.getElementById(uid2)?.classList.add('visible'); document.getElementById('toggle_' + uid2)?.classList.add('abierto'); }
                if (uid1) { document.getElementById(uid1)?.classList.add('visible'); document.getElementById('toggle_' + uid1)?.classList.add('abierto'); }
            }
        });
    }

    /* ── Renderizar panel 3 niveles ── */
    function renderizarPanelCapas() {
        const lista = document.getElementById('capas-lista');
        lista.innerHTML = '';
    
        Object.entries(carpetasData).forEach(([r, nivel2]) => {
            const uid1 = 'u1_' + Math.random().toString(36).slice(2);
            const wrapper1 = document.createElement('div');
    
            wrapper1.innerHTML = `
                <div class="n1-header" onclick="toggleFolder('${uid1}', event)">
                    <input type="checkbox" checked onclick="event.stopPropagation()" onchange="toggleNivel(this)">
                    <span class="n1-nombre">${r}</span>
                    <span class="carpeta-toggle" id="toggle_${uid1}">▶</span>
                </div>
                <div class="subcarpetas" id="${uid1}"></div>`;
            lista.appendChild(wrapper1);
    
            const cont1 = document.getElementById(uid1);
    
            Object.entries(nivel2).forEach(([s, nivel3]) => {
                const uid2 = 'u2_' + Math.random().toString(36).slice(2);
                const wrapper2 = document.createElement('div');
    
                wrapper2.innerHTML = `
                    <div class="n2-header" onclick="toggleFolder('${uid2}', event)">
                        <input type="checkbox" checked onclick="event.stopPropagation()" onchange="toggleNivel(this)">
                        <span class="n2-nombre">${s}</span>
                        <span class="carpeta-toggle" id="toggle_${uid2}">▶</span>
                    </div>
                    <div class="subcarpetas" id="${uid2}"></div>`;
                cont1.appendChild(wrapper2);
    
                const cont2 = document.getElementById(uid2);
    
                Object.entries(nivel3).forEach(([ss, data]) => {
                    const item = document.createElement('div');
                    item.className = 'n3-item';
                    
                    // Asignamos las variables de forma nativa para evitar que los caracteres especiales (/, "", -) rompan el HTML
                    item.dataset.r = r;
                    item.dataset.s = s;
                    item.dataset.ss = ss;
                    
                    item.innerHTML = `
                        <input type="checkbox" checked onchange="toggleNivel(this)">
                        <span class="n3-nombre">${ss}</span>
                        <span class="n3-count">${data.count}</span>`;
                    cont2.appendChild(item);
                });
            });
        });
    }

    /* ── Mapa ── */
    function iniciarMapa() {
        map = L.map('map').setView([25.68, -100.31], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

        document.getElementById('kmzSelect').addEventListener('change', function() {
            if (this.value) cargarKMZDesdeURL(this.value);
        });
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0]; if (!file) return;
            setPinInfo('Cargando ' + file.name + '...');
            await parsearKMZ(await file.arrayBuffer());
            setPinInfo(file.name + ' ✓');
        });
        document.getElementById('btn-ir').addEventListener('click', irManual);
        ['latInput','lngInput'].forEach(id => {
            document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') irManual(); });
        });
    }

    function setPinInfo(txt) { document.getElementById('mapa-pin-info').textContent = txt; }

    function irManual() {
        const lat = parseFloat(document.getElementById('latInput').value);
        const lng = parseFloat(document.getElementById('lngInput').value);
        if (isNaN(lat) || isNaN(lng)) { setPinInfo('Coords inválidas'); return; }
        irACoordenadas(lat, lng, lat + ', ' + lng);
    }

    function irACoordenadas(lat, lng, label) {
        if (!mapaIniciado) { iniciarMapa(); mapaIniciado = true; }
        switchTab('mapa');
        setTimeout(() => {
            map.invalidateSize();
            if (pinActual) map.removeLayer(pinActual);
            pinActual = L.marker([lat, lng], {
                icon: L.divIcon({
                    className: '',
                    html: '<div style="background:#ea580c;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 0 6px rgba(0,0,0,0.4)"></div>',
                    iconAnchor: [8, 8]
                })
            }).addTo(map);
            pinActual.bindPopup('<b>' + (label || '') + '</b><br>' + lat + ', ' + lng).openPopup();
            map.setView([lat, lng], 16);
            setPinInfo('📍 ' + (label || lat + ', ' + lng));
        }, 150);
    }

    async function cargarKMZDesdeURL(filename) {
        setPinInfo('Cargando ' + filename + '...');
        try {
            const r = await fetch(BASE_URL + filename);
            if (!r.ok) throw new Error('HTTP ' + r.status);
            await parsearKMZ(await r.arrayBuffer());
            setPinInfo(filename + ' ✓');
        } catch (err) { setPinInfo('Error: ' + err.message); }
    }

    async function parsearKMZ(buffer) {
        // Limpiar capas anteriores
        Object.values(carpetasData).forEach(nv2 =>
            Object.values(nv2).forEach(nv3 =>
                Object.values(nv3).forEach(d => map.removeLayer(d.layerGroup))
            )
        );
        carpetasData = {};

        const zip = await JSZip.loadAsync(buffer);
        const kmlFile = Object.values(zip.files).find(f => f.name.endsWith('.kml'));
        if (!kmlFile) { alert('No se encontró KML'); return; }
        const kmlDoc = new DOMParser().parseFromString(await kmlFile.async('string'), 'text/xml');

        // Estilos
        const styles = {};
        kmlDoc.querySelectorAll('Style').forEach(s => {
            const id = s.getAttribute('id'); if (!id) return;
            styles['#' + id] = {
                iconHref: s.querySelector('IconStyle Icon href')?.textContent?.trim(),
                lineColor: s.querySelector('LineStyle color')?.textContent?.trim(),
                polyColor: s.querySelector('PolyStyle color')?.textContent?.trim()
            };
        });
        kmlDoc.querySelectorAll('StyleMap').forEach(sm => {
            const id = sm.getAttribute('id');
            const pair = [...sm.querySelectorAll('Pair')].find(p => p.querySelector('key')?.textContent === 'normal');
            const url = pair?.querySelector('styleUrl')?.textContent?.trim();
            if (id && url) styles['#' + id] = styles[url] || {};
        });

        function hex(c) { return (!c || c.length < 8) ? null : '#' + c.slice(6,8) + c.slice(4,6) + c.slice(2,4); }
        function coords(el) {
            if (!el?.textContent) return [];
            return el.textContent.trim().split(/\s+/).map(c => {
                const p = c.split(',').map(Number);
                return (p.length < 2 || isNaN(p[0]) || isNaN(p[1])) ? null : [p[1], p[0]];
            }).filter(Boolean);
        }

        function getLG(r, s, ss) {
            if (!carpetasData[r]) carpetasData[r] = {};
            if (!carpetasData[r][s]) carpetasData[r][s] = {};
            if (!carpetasData[r][s][ss]) carpetasData[r][s][ss] = { layerGroup: L.layerGroup().addTo(map), count: 0 };
            return carpetasData[r][s][ss];
        }

        function crearLayers(pm, style, r, s, ss) {
            const name = pm.querySelector(':scope > name')?.textContent?.trim() || '';
            const desc = pm.querySelector(':scope > description')?.textContent?.trim() || '';
            const popup = '<b>' + name + '</b>' + (desc ? '<br>' + desc : '');
            const layers = [];

            function onClick(l) { l.on('click', () => resaltarCarpeta(r, s, ss)); }

            pm.querySelectorAll('Polygon').forEach(poly => {
                const c = coords(poly.querySelector('outerBoundaryIs coordinates'));
                if (!c.length) return;
                const color = hex(style.polyColor) || hex(style.lineColor) || '#3388ff';
                const l = L.polygon(c, { color, fillColor: color, fillOpacity: 0.4 });
                l.bindPopup(popup); if (name) l.bindTooltip(name, { sticky: true });
                onClick(l); layers.push(l);
            });
            pm.querySelectorAll('LineString').forEach(line => {
                const c = coords(line.querySelector('coordinates'));
                if (!c.length) return;
                const l = L.polyline(c, { color: hex(style.lineColor) || '#e74c3c', weight: 3 });
                l.bindPopup(popup); if (name) l.bindTooltip(name, { sticky: true });
                onClick(l); layers.push(l);
            });
            pm.querySelectorAll('Point').forEach(point => {
                const c = coords(point.querySelector('coordinates'));
                if (!c.length) return;
                const m = style.iconHref
                    ? L.marker(c[0], { icon: L.icon({ iconUrl: style.iconHref, iconSize: [32,32], iconAnchor: [16,32], popupAnchor: [0,-32] }) })
                    : L.marker(c[0]);
                m.bindPopup(popup); if (name) m.bindTooltip(name, { permanent: false, direction: 'top' });
                onClick(m); layers.push(m);
            });
            return layers;
        }

        const todosLosBounds = [];

        kmlDoc.querySelectorAll('Document > Folder, kml > Folder').forEach(f1 => {
            const r = f1.querySelector(':scope > name')?.textContent?.trim() || 'Raíz';

            [...f1.querySelectorAll(':scope > Folder')].forEach(f2 => {
                const s = f2.querySelector(':scope > name')?.textContent?.trim() || 'Sub';

                [...f2.querySelectorAll(':scope > Folder')].forEach(f3 => {
                    const ss = f3.querySelector(':scope > name')?.textContent?.trim() || 'Sub-sub';
                    const lg = getLG(r, s, ss);
                    f3.querySelectorAll(':scope > Placemark').forEach(pm => {
                        const style = styles[pm.querySelector('styleUrl')?.textContent?.trim()] || {};
                        crearLayers(pm, style, r, s, ss).forEach(l => {
                            lg.layerGroup.addLayer(l); lg.count++;
                            if (l.getLatLng) todosLosBounds.push(l.getLatLng());
                            else if (l.getBounds) { const b = l.getBounds(); todosLosBounds.push(b.getNorthEast(), b.getSouthWest()); }
                        });
                    });
                });

                // Placemarks directos en nivel 2
                [...f2.querySelectorAll(':scope > Placemark')].forEach(pm => {
                    const style = styles[pm.querySelector('styleUrl')?.textContent?.trim()] || {};
                    const lg = getLG(r, s, '—');
                    crearLayers(pm, style, r, s, '—').forEach(l => { lg.layerGroup.addLayer(l); lg.count++; });
                });
            });

            // Placemarks directos en nivel 1
            [...f1.querySelectorAll(':scope > Placemark')].forEach(pm => {
                const style = styles[pm.querySelector('styleUrl')?.textContent?.trim()] || {};
                const lg = getLG(r, '—', '—');
                crearLayers(pm, style, r, '—', '—').forEach(l => { lg.layerGroup.addLayer(l); lg.count++; });
            });
        });

        if (todosLosBounds.length) map.fitBounds(L.latLngBounds(todosLosBounds));
        renderizarPanelCapas();
    }

    /* ── Overrides app.js ── */
    function renderizarTabla(datos) {
        const tbody = document.querySelector('#resultTable tbody');
        if (!datos.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#64748b;">😕 Sin resultados</td></tr>';
            return;
        }
        tbody.innerHTML = datos.map(res => {
            if (res.encontrado) {
                const lat = parseFloat(res.lat), lng = parseFloat(res.lon);
                return `<tr>
                    <td data-label="ESTADO">✅</td>
                    <td data-label="CUENTA"><b>${res.cuenta}</b></td>
                    <td data-label="QR"><span class="qr-badge" onclick="copiarQR('${res.qr}', this)" title="Tap para copiar">${res.qr}</span></td>
                    <td data-label="COORD" style="font-size:11px;color:#64748b;">${res.lat}, ${res.lon}</td>
                    <td><button class="btn-ver-mapa" onclick="irACoordenadas(${lat},${lng},'${res.qr} · ${res.cuenta}')">🗺 Ver</button></td>
                </tr>`;
            } else {
                return `<tr class="no-encontrada">
                    <td>❌</td><td>${res.cuenta}</td><td colspan="3">No encontrada en inventario</td>
                </tr>`;
            }
        }).join('');
    }

    function mostrarResumen(conteo) {
        const contenedorStats = document.getElementById('summaryStats');
        const contenido = document.getElementById('statsContent');
        const ordenados = Object.entries(conteo).sort((a, b) => b[1] - a[1]);
        if (!ordenados.length) { contenedorStats.style.display = 'none'; return; }
        contenedorStats.style.display = 'block';
        contenido.innerHTML = ordenados.map(([qr, total]) => {
            const dato = resultadosActuales.find(r => r.qr === qr && r.encontrado);
            const lat = dato ? parseFloat(dato.lat) : null;
            const lng = dato ? parseFloat(dato.lon) : null;
            const click = lat ? `irACoordenadas(${lat},${lng},'${qr}')` : '';
            return `<div class="stat-card" onclick="${click}">
                <span style="font-size:10px;font-weight:700;color:#2563eb;display:block;margin-bottom:4px;">🗺 VER MAPA</span>
                <span style="font-size:12px;font-weight:700;color:#1e293b;display:block;border-bottom:1px dashed #cbd5e1;padding-bottom:4px;margin-bottom:4px;">${qr}</span>
                <div style="font-size:20px;font-weight:700;color:#1e293b;">${total} <small style="font-size:10px;color:#64748b;">ctes</small></div>
            </div>`;
        }).join('');
    }
    function filtrarCapas(texto) {
    const term = texto.toLowerCase().trim();

    // Filtramos los elementos de nivel 3 (los Placemarks/Marcadores finales)
    document.querySelectorAll('.n3-item').forEach(item => {
        const nombre = item.querySelector('.n3-nombre').textContent.toLowerCase();
        
        if (nombre.includes(term)) {
            item.style.display = 'flex'; // Lo mostramos
        } else {
            item.style.display = 'none'; // Lo ocultamos
        }
    });

    // Lógica para expandir automáticamente las carpetas si estamos buscando algo
    if (term !== '') {
        document.querySelectorAll('.subcarpetas').forEach(sub => {
            // Revisamos si esta carpeta tiene algún hijo visible
            const tieneVisibles = Array.from(sub.querySelectorAll('.n3-item')).some(i => i.style.display !== 'none');
            
            if (tieneVisibles) {
                sub.classList.add('visible');
                // Girar la flechita
                const toggleBtn = document.getElementById('toggle_' + sub.id);
                if (toggleBtn) toggleBtn.classList.add('abierto');
                
                // Mostrar también el encabezado de Nivel 2 y Nivel 1
                const headerAnterior = sub.previousElementSibling;
                if(headerAnterior) headerAnterior.style.display = 'flex';
            } else {
                // Si la carpeta no tiene coincidencias, ocultamos su encabezado para limpiar la vista
                const headerAnterior = sub.previousElementSibling;
                if(headerAnterior && (headerAnterior.classList.contains('n2-header') || headerAnterior.classList.contains('n1-header'))) {
                    headerAnterior.style.display = 'none';
                }
            }
        });
    } else {
        // Si el buscador está vacío, restauramos la vista original
        document.querySelectorAll('.n1-header, .n2-header').forEach(h => h.style.display = 'flex');
        document.querySelectorAll('.subcarpetas').forEach(sub => {
            sub.classList.remove('visible');
            const toggleBtn = document.getElementById('toggle_' + sub.id);
            if (toggleBtn) toggleBtn.classList.remove('abierto');
        });
    }
}
