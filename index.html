<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R3 Scripts</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #16a34a;
            --warning: #ea580c;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #1e293b;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Panel izquierdo: buscador */
        #panel-busqueda {
            width: 100%;
            max-width: 860px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
            flex-shrink: 0;
            transition: max-width 0.3s ease;
        }

        body.mapa-abierto #panel-busqueda {
            max-width: 480px;
        }

        /* Panel derecho: mapa */
        #panel-mapa {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #e2e8f0;
            background: #1e293b;
            transform: translateX(100%);
            width: 0;
            transition: transform 0.3s ease, width 0.3s ease;
            overflow: hidden;
        }

        body.mapa-abierto #panel-mapa {
            transform: translateX(0);
            width: auto;
        }

        #mapa-header {
            padding: 12px 16px;
            background: #1e293b;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-shrink: 0;
        }

        #mapa-header select {
            padding: 5px 8px;
            border-radius: 6px;
            border: none;
            font-size: 13px;
            cursor: pointer;
            background: #334155;
            color: white;
        }

        #mapa-header input[type="text"] {
            padding: 5px 8px;
            border-radius: 6px;
            border: none;
            font-size: 13px;
            width: 100px;
            background: #334155;
            color: white;
        }

        #mapa-header input[type="text"]::placeholder { color: #94a3b8; }

        #btn-cerrar-mapa {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        #map { flex: 1; }

        #mapa-status {
            font-size: 12px;
            color: #94a3b8;
            white-space: nowrap;
        }

        h2 {
            color: #0f172a;
            font-weight: 700;
            margin: 0 0 16px;
            text-align: center;
            font-size: 1.2rem;
        }

        .config, .input-section {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 100%;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--secondary);
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 12px;
        }

        textarea:focus { outline: 2px solid #93c5fd; border-color: var(--primary); }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-size: 15px;
            font-family: inherit;
        }

        button:hover { background-color: #1d4ed8; }

        .btn-secondary {
            background-color: var(--secondary);
            margin-top: 8px;
            font-size: 14px;
            padding: 8px;
        }

        #resultTable {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-top: 4px;
        }

        #resultTable thead th {
            background-color: #1e293b;
            color: #f8fafc;
            text-align: left;
            padding: 14px 16px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
        }

        #resultTable tbody td {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 13px;
        }

        #resultTable tbody tr:hover { background-color: #f1f7ff; }

        .btn-mapa-inline {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: inherit;
            width: auto;
        }

        .btn-mapa-inline:hover { background-color: #1d4ed8; }

        .qr-badge {
            background: #fff7ed;
            color: var(--warning);
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid #ffedd5;
            cursor: pointer;
        }

        .no-encontrada { background-color: #fff1f2 !important; color: #be123c; }

        #resultCounter {
            display: none;
            font-size: 14px;
            margin: 8px 0 4px;
            padding: 10px 16px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        #summaryStats { display: none; border-top: 4px solid var(--primary); }

        #statsContent { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 10px; }

        #statsContent div { transition: transform 0.2s; cursor: default; }
        #statsContent div:hover { transform: scale(1.03); background-color: #e2e8f0 !important; }
        #statsContent a { text-decoration: none; display: block; }
        #statsContent a:hover { opacity: 0.85; }

        #inventarioStatus { font-size: 13px; color: #64748b; margin-bottom: 12px; }

        @media (max-width: 640px) {
            body { flex-direction: column; }
            #panel-busqueda { max-width: 100% !important; }
            body.mapa-abierto #panel-busqueda { display: none; }
            #panel-mapa { transform: none; width: 100%; height: 60vh; }
            body.mapa-abierto #panel-mapa { height: 100%; }
        }
    </style>
</head>
<body>

<!-- Panel buscador -->
<div id="panel-busqueda">
    <h2>Buscador de Cuentas e Inventario QR</h2>

    <p id="inventarioStatus">⏳ Cargando inventario...</p>

    <div class="input-section">
        <label>Cargar Listado de Clientes:</label>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;">
            <div style="flex:1; min-width:180px;">
                <small>Opción A: Subir CSV</small>
                <input type="file" id="clientCsvFile" accept=".csv" style="margin-top:5px; display:block;">
            </div>
            <div style="flex:1; min-width:180px;">
                <small>Opción B: Pegar reporte</small>
                <textarea id="reportInput" placeholder="Pega aquí el reporte..."></textarea>
            </div>
        </div>
        <button onclick="procesarBusqueda()" id="btnBuscar">🔍 Localizar QRs</button>
        <button onclick="limpiarTodo()" class="btn-secondary">🗑️ Limpiar Resultados</button>
    </div>

    <div id="resultCounter"></div>

    <div id="summaryStats" class="config">
        <label>📊 Resumen de Impacto por QR:</label>
        <div id="statsContent"></div>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th onclick="ordenarTabla(0)">Estado ↕</th>
                <th onclick="ordenarTabla(1)">Cuenta ↕</th>
                <th onclick="ordenarTabla(2)">QR ↕</th>
                <th>Coordenadas</th>
                <th>Mapa</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- Panel mapa -->
<div id="panel-mapa">
    <div id="mapa-header">
        <select id="kmzSelect">
            <option value="">-- KMZ --</option>
            <option value="ALDAMA_1.kmz">Aldama 1</option>
            <option value="ALDAMA_2.kmz">Aldama 2</option>
        </select>
        <input type="file" id="fileInput" accept=".kmz" title="Subir KMZ" style="font-size:11px; color:white; width:90px;">
        <input type="text" id="latInput" placeholder="Lat" style="width:80px;">
        <input type="text" id="lngInput" placeholder="Lng" style="width:80px;">
        <button id="btn-ir-coords" style="width:auto; padding:5px 10px; font-size:13px; background:#ea580c;">📍 Ir</button>
        <span id="mapa-status"></span>
        <button id="btn-cerrar-mapa" onclick="cerrarMapa()">✕ Cerrar</button>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="app.js?v=100"></script>
<script>
    /* ========== MAPA ========== */
    const BASE_URL = 'https://api.allorigins.win/raw?url=https://raw.githubusercontent.com/Totalitoplay/kmz-finder/main/';

    var map = L.map('map').setView([25.68, -100.31], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

    var kmzLayer = L.layerGroup().addTo(map);
    var coordMarker = null;
    var pinActual = null;
    const mapaStatus = document.getElementById('mapa-status');

    function abrirMapa() {
        document.body.classList.add('mapa-abierto');
        setTimeout(() => map.invalidateSize(), 350);
    }

    function cerrarMapa() {
        document.body.classList.remove('mapa-abierto');
    }

    function irACoordenadas(lat, lng, label) {
        abrirMapa();
        if (pinActual) map.removeLayer(pinActual);
        pinActual = L.marker([lat, lng], {
            icon: L.divIcon({
                className: '',
                html: `<div style="background:#e67e22;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 0 6px rgba(0,0,0,0.5)"></div>`,
                iconAnchor: [8, 8]
            })
        }).addTo(map);
        pinActual.bindPopup(`<b>${label || 'Punto'}</b><br>${lat}, ${lng}`).openPopup();
        map.setView([lat, lng], 15);
        mapaStatus.textContent = label ? `📍 ${label}` : `${lat}, ${lng}`;
    }

    // Ir a coords manuales
    document.getElementById('btn-ir-coords').addEventListener('click', function() {
        const lat = parseFloat(document.getElementById('latInput').value);
        const lng = parseFloat(document.getElementById('lngInput').value);
        if (isNaN(lat) || isNaN(lng)) { mapaStatus.textContent = 'Coords inválidas'; return; }
        irACoordenadas(lat, lng, `${lat}, ${lng}`);
    });

    ['latInput','lngInput'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('btn-ir-coords').click();
        });
    });

    // Selector KMZ
    document.getElementById('kmzSelect').addEventListener('change', function() {
        if (this.value) cargarKMZDesdeURL(this.value);
    });

    // Subida manual KMZ
    document.getElementById('fileInput').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        mapaStatus.textContent = `Cargando ${file.name}...`;
        const buf = await file.arrayBuffer();
        await parsearKMZ(buf);
        mapaStatus.textContent = `${file.name} ✓`;
    });

    async function cargarKMZDesdeURL(filename) {
        mapaStatus.textContent = `Cargando ${filename}...`;
        try {
            const r = await fetch(BASE_URL + filename);
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const buf = await r.arrayBuffer();
            await parsearKMZ(buf);
            mapaStatus.textContent = `${filename} ✓`;
        } catch (err) {
            mapaStatus.textContent = 'Error: ' + err.message;
        }
    }

    async function parsearKMZ(buffer) {
        const zip = await JSZip.loadAsync(buffer);
        const kmlFile = Object.values(zip.files).find(f => f.name.endsWith('.kml'));
        if (!kmlFile) { alert('No se encontró KML'); return; }

        const kmlDoc = new DOMParser().parseFromString(await kmlFile.async('string'), 'text/xml');

        const styles = {};
        kmlDoc.querySelectorAll('Style').forEach(s => {
            const id = s.getAttribute('id');
            if (!id) return;
            styles['#' + id] = {
                iconHref: s.querySelector('IconStyle Icon href')?.textContent?.trim(),
                lineColor: s.querySelector('LineStyle color')?.textContent?.trim(),
                polyColor: s.querySelector('PolyStyle color')?.textContent?.trim()
            };
        });
        kmlDoc.querySelectorAll('StyleMap').forEach(sm => {
            const id = sm.getAttribute('id');
            const pair = [...sm.querySelectorAll('Pair')].find(p => p.querySelector('key')?.textContent === 'normal');
            const url = pair?.querySelector('styleUrl')?.textContent?.trim();
            if (id && url) styles['#' + id] = styles[url] || {};
        });

        function hex(c) {
            if (!c || c.length < 8) return null;
            return '#' + c.slice(6,8) + c.slice(4,6) + c.slice(2,4);
        }

        const layers = [];
        kmlDoc.querySelectorAll('Placemark').forEach(pm => {
            const name = pm.querySelector('name')?.textContent?.trim() || '';
            const desc = pm.querySelector('description')?.textContent?.trim() || '';
            const style = styles[pm.querySelector('styleUrl')?.textContent?.trim()] || {};
            const popup = `<b>${name}</b>${desc ? '<br>' + desc : ''}`;

            pm.querySelectorAll('Polygon').forEach(poly => {
                const c = coords(poly.querySelector('outerBoundaryIs coordinates'));
                if (!c.length) return;
                const color = hex(style.polyColor) || hex(style.lineColor) || '#3388ff';
                const l = L.polygon(c, { color, fillColor: color, fillOpacity: 0.4 });
                l.bindPopup(popup);
                if (name) l.bindTooltip(name, { sticky: true });
                layers.push(l);
            });
            pm.querySelectorAll('LineString').forEach(line => {
                const c = coords(line.querySelector('coordinates'));
                if (!c.length) return;
                const color = hex(style.lineColor) || '#e74c3c';
                const l = L.polyline(c, { color, weight: 3 });
                l.bindPopup(popup);
                if (name) l.bindTooltip(name, { sticky: true });
                layers.push(l);
            });
            pm.querySelectorAll('Point').forEach(point => {
                const c = coords(point.querySelector('coordinates'));
                if (!c.length) return;
                const m = style.iconHref
                    ? L.marker(c[0], { icon: L.icon({ iconUrl: style.iconHref, iconSize: [32,32], iconAnchor: [16,32], popupAnchor: [0,-32] }) })
                    : L.marker(c[0]);
                m.bindPopup(popup);
                if (name) m.bindTooltip(name, { permanent: false, direction: 'top' });
                layers.push(m);
            });
        });

        kmzLayer.clearLayers();
        if (!layers.length) { alert('Sin geometrías válidas'); return; }
        layers.forEach(l => kmzLayer.addLayer(l));
        map.fitBounds(kmzLayer.getBounds());
    }

    function coords(el) {
        if (!el?.textContent) return [];
        return el.textContent.trim().split(/\s+/).map(c => {
            const p = c.split(',').map(Number);
            if (p.length < 2 || isNaN(p[0]) || isNaN(p[1])) return null;
            return [p[1], p[0]];
        }).filter(Boolean);
    }

    /* ========== OVERRIDE renderizarTabla para botón mapa integrado ========== */
    function renderizarTabla(datos) {
        const tbody = document.querySelector("#resultTable tbody");
        if (datos.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:#64748b;">😕 Sin resultados</td></tr>`;
            return;
        }
        let html = "";
        datos.forEach(res => {
            if (res.encontrado) {
                html += `
                    <tr>
                        <td data-label="ESTADO"><span title="Encontrada">✅</span></td>
                        <td data-label="CUENTA"><b>${res.cuenta}</b></td>
                        <td data-label="QR">
                            <span class="qr-badge" onclick="copiarQR('${res.qr}', this)" title="Tap para copiar">${res.qr}</span>
                        </td>
                        <td data-label="COORD" style="font-size:11px;">${res.lat}, ${res.lon}</td>
                        <td data-label="ACCIÓN">
                            <button class="btn-mapa-inline"
                                onclick="irACoordenadas(${parseFloat(res.lat)}, ${parseFloat(res.lon)}, '${res.qr} · ${res.cuenta}')">
                                🗺 Ver mapa
                            </button>
                        </td>
                    </tr>`;
            } else {
                html += `
                    <tr class="no-encontrada">
                        <td data-label="ESTADO">❌</td>
                        <td data-label="CUENTA">${res.cuenta}</td>
                        <td colspan="3">No encontrada en Inventario</td>
                    </tr>`;
            }
        });
        tbody.innerHTML = html;
    }
</script>
</body>
</html>
