<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Clusters - Red</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #mapa { width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <div id="mapa"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-kml@1.0.0/L.KML.js"></script>

    <script>
        // Inicializar el mapa
        var map = L.map('mapa').setView([31.735, -106.481], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Fetch lee tu archivo KML local directamente
        fetch('CLUSTERS.kml')
            .then(res => res.text())
            .then(kmltext => {
                // Parsear el texto a formato XML
                const parser = new DOMParser();
                const kml = parser.parseFromString(kmltext, 'text/xml');
                
                // L.KML procesa el XML e inyecta los colores, bordes y popups originales
                const capaKml = new L.KML(kml);
                
                map.addLayer(capaKml);
                
                // Ajustar el encuadre automáticamente para ver toda la mancha de clusters
                const limites = capaKml.getBounds();
                if (limites.isValid()) {
                    map.fitBounds(limites);
                }
            })
            .catch(err => console.error('Error cargando el KML:', err));
    </script>
</body>
</html>
