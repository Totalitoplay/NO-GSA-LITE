<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Clusters</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #mapa { width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <div id="mapa"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://api.tiles.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>

    <script>
        // Inicializar el mapa centrado cerca de las coordenadas del KML
        var map = L.map('mapa').setView([31.735, -106.481], 13);

        // Añadir el mapa base (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Cargar el archivo KML
        // Nota: Por políticas de CORS en navegadores, esto debe ejecutarse sobre un servidor (local o en la nube)
        var capaKml = omnivore.kml('CLUSTERS.kml')
            .on('ready', function() {
                // Ajustar el zoom automáticamente para que todos los clusters sean visibles
                map.fitBounds(capaKml.getBounds());
                
                // Opcional: Añadir un popup a cada polígono con su nombre
                capaKml.eachLayer(function(layer) {
                    if (layer.feature && layer.feature.properties) {
                        layer.bindPopup("<b>Cluster:</b> " + layer.feature.properties.name);
                    }
                });
            })
            .addTo(map);
    </script>
</body>
</html>
